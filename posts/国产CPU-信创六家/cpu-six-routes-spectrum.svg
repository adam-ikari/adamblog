<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="selfGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    text { fill: #333333; }
    .title { font-size: 27px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 18px; fill: #666; }
    .axis-label { font-size: 17px; font-weight: 600; }
    .cpu-name { font-size: 20px; font-weight: 700; }
    .cpu-arch { font-size: 15px; fill: #555; }
    .cpu-note { font-size: 15px; }
  </style>

  <text x="400" y="34" text-anchor="middle" class="title">国产 CPU 六路线：自主程度光谱</text>
  <text x="400" y="58" text-anchor="middle" class="sub">从"授权/合资"到"完全自研指令集"——每家都在自主与可用之间选了不同的点</text>

  <!-- 光谱条 -->
  <rect x="60" y="100" width="680" height="22" rx="11" fill="url(#selfGrad)" opacity="0.85"/>
  <text x="80" y="148" class="axis-label" fill="#dc2626">◀ 授权 / 合资</text>
  <text x="720" y="148" text-anchor="end" class="axis-label" fill="#16a34a">完全自研 ▶</text>
  <text x="400" y="148" text-anchor="middle" class="axis-label" fill="#b45309">ARM 架构授权（居中）</text>

  <!-- 六家定位（按自主程度从低到高排列） -->
  <!-- 海光 -->
  <rect x="70" y="180" width="120" height="120" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="210" text-anchor="middle" class="cpu-name" fill="#991b1b">海光</text>
  <text x="130" y="232" text-anchor="middle" class="cpu-arch">x86（Zen 1）</text>
  <text x="130" y="256" text-anchor="middle" class="cpu-note" fill="#dc2626">合资拿现成</text>
  <text x="130" y="278" text-anchor="middle" class="cpu-note" fill="#dc2626">已断供</text>
  <text x="130" y="300" text-anchor="middle" class="cpu-note" fill="#888">服务器</text>

  <!-- 兆芯 -->
  <rect x="210" y="180" width="120" height="120" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1" filter="url(#shadow)"/>
  <text x="270" y="210" text-anchor="middle" class="cpu-name" fill="#92400e">兆芯</text>
  <text x="270" y="232" text-anchor="middle" class="cpu-arch">x86（经威盛）</text>
  <text x="270" y="256" text-anchor="middle" class="cpu-note" fill="#b45309">二手 x86 授权</text>
  <text x="270" y="278" text-anchor="middle" class="cpu-note" fill="#b45309">兼容性好</text>
  <text x="270" y="300" text-anchor="middle" class="cpu-note" fill="#888">桌面/服务器</text>

  <!-- 飞腾 -->
  <rect x="350" y="180" width="120" height="120" rx="8" fill="#fef3c7" stroke="#fde68a" stroke-width="1" filter="url(#shadow)"/>
  <text x="410" y="210" text-anchor="middle" class="cpu-name" fill="#92400e">飞腾</text>
  <text x="410" y="232" text-anchor="middle" class="cpu-arch">ARM</text>
  <text x="410" y="256" text-anchor="middle" class="cpu-note" fill="#b45309">ARM 架构授权</text>
  <text x="410" y="278" text-anchor="middle" class="cpu-note" fill="#b45309">CEC 系</text>
  <text x="410" y="300" text-anchor="middle" class="cpu-note" fill="#888">服务器/桌面</text>

  <!-- 鲲鹏 -->
  <rect x="490" y="180" width="120" height="120" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1" filter="url(#shadow)"/>
  <text x="550" y="210" text-anchor="middle" class="cpu-name" fill="#166534">鲲鹏</text>
  <text x="550" y="232" text-anchor="middle" class="cpu-arch">ARMv8.2（TaiShan）</text>
  <text x="550" y="256" text-anchor="middle" class="cpu-note" fill="#15803d">ARM 授权+自研核</text>
  <text x="550" y="278" text-anchor="middle" class="cpu-note" fill="#15803d">华为海思</text>
  <text x="550" y="300" text-anchor="middle" class="cpu-note" fill="#888">服务器</text>

  <!-- 龙芯 -->
  <rect x="70" y="330" width="270" height="120" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205" y="362" text-anchor="middle" class="cpu-name" fill="#166534">龙芯</text>
  <text x="205" y="386" text-anchor="middle" class="cpu-arch">LoongArch（自研指令集）</text>
  <text x="205" y="410" text-anchor="middle" class="cpu-note" fill="#15803d">完全自研 · 命脉在手</text>
  <text x="205" y="432" text-anchor="middle" class="cpu-note" fill="#dc2626">代价：生态孤立</text>

  <!-- 申威 -->
  <rect x="490" y="330" width="270" height="120" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="625" y="362" text-anchor="middle" class="cpu-name" fill="#166534">申威</text>
  <text x="625" y="386" text-anchor="middle" class="cpu-arch">SW64（自研指令集）</text>
  <text x="625" y="410" text-anchor="middle" class="cpu-note" fill="#15803d">完全自研 · 超算专用</text>
  <text x="625" y="432" text-anchor="middle" class="cpu-note" fill="#dc2626">代价：不参与通用市场</text>

  <!-- 底部总结 -->
  <rect x="60" y="480" width="680" height="60" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="0.5"/>
  <text x="400" y="508" text-anchor="middle" class="cpu-note" fill="#444">两极加中间：龙芯/申威完全自研（命脉在手但生态孤立）</text>
  <text x="400" y="528" text-anchor="middle" class="cpu-note" fill="#444">兆芯/海光授权合资（兼容性好但受制于人）· 鲲鹏/飞腾居中取平衡</text>
</svg>
