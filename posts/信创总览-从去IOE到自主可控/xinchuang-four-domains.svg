<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="appGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="baseSoftGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="infraGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="secGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <style>
    text { fill: #333333; }
    .title { font-size: 27px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 18px; fill: #666; }
    .layer-title { font-size: 22px; font-weight: 700; }
    .layer-sub { font-size: 17px; }
    .item { font-size: 16px; fill: #555; }
    .side-title { font-size: 20px; font-weight: 700; }
  </style>

  <text x="400" y="34" text-anchor="middle" class="title">信创四大领域：全栈国产闭环</text>
  <text x="400" y="58" text-anchor="middle" class="sub">硬件底座 → 运行土壤 → 上层应用，安全横贯全栈——缺一块闭环就闭不上</text>

  <!-- ===== 应用软件层（顶） ===== -->
  <rect x="40" y="86" width="560" height="96" rx="8" fill="url(#appGrad)" filter="url(#shadow)" stroke="#67e8f9" stroke-width="0.5"/>
  <text x="320" y="116" text-anchor="middle" class="layer-title" fill="#0c4a6e">应用软件</text>
  <text x="320" y="140" text-anchor="middle" class="layer-sub" fill="#155e75">办公 · 通用 · 行业软件（最贴近用户）</text>
  <text x="320" y="164" text-anchor="middle" class="item">WPS · 永中 · 福昕 · 中望 CAD</text>

  <!-- 右侧标注：应用 -->
  <rect x="620" y="86" width="150" height="96" rx="6" fill="none" stroke="#67e8f9" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="695" y="124" text-anchor="middle" class="side-title" fill="#0e7490">替代最直观</text>
  <text x="695" y="150" text-anchor="middle" class="item" fill="#155e75">Office→WPS</text>
  <text x="695" y="170" text-anchor="middle" class="item" fill="#155e75">AutoCAD→中望</text>

  <line x1="320" y1="182" x2="320" y2="206" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <text x="336" y="200" class="item" fill="#888">运行于</text>

  <!-- ===== 基础软件层（中） ===== -->
  <rect x="40" y="210" width="560" height="96" rx="8" fill="url(#baseSoftGrad)" filter="url(#shadow)" stroke="#c4b5fd" stroke-width="0.5"/>
  <text x="320" y="240" text-anchor="middle" class="layer-title" fill="#4c1d95">基础软件</text>
  <text x="320" y="264" text-anchor="middle" class="layer-sub" fill="#5b21b6">跑应用的土壤</text>
  <text x="320" y="288" text-anchor="middle" class="item">麒麟/UOS · 达梦/OceanBase · 东方通 · 信创云</text>

  <rect x="620" y="210" width="150" height="96" rx="6" fill="none" stroke="#c4b5fd" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="695" y="248" text-anchor="middle" class="side-title" fill="#6d28d9">生态关键层</text>
  <text x="695" y="274" text-anchor="middle" class="item" fill="#5b21b6">OS + 数据库</text>
  <text x="695" y="294" text-anchor="middle" class="item" fill="#5b21b6">+ 中间件</text>

  <line x1="320" y1="306" x2="320" y2="330" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <text x="336" y="324" class="item" fill="#888">运行于</text>

  <!-- ===== 基础设施层（底） ===== -->
  <rect x="40" y="334" width="560" height="110" rx="8" fill="url(#infraGrad)" filter="url(#shadow)" stroke="#fcd34d" stroke-width="0.5"/>
  <text x="320" y="364" text-anchor="middle" class="layer-title" fill="#92400e">基础设施（底座）</text>
  <text x="320" y="388" text-anchor="middle" class="layer-sub" fill="#b45309">计算与连接的硬件根基</text>
  <text x="320" y="412" text-anchor="middle" class="item">CPU 六路线 · 服务器 · 交换机 · 路由器</text>
  <text x="320" y="432" text-anchor="middle" class="item" fill="#b45309">龙芯·鲲鹏·飞腾·兆芯·海光·申威</text>

  <rect x="620" y="334" width="150" height="110" rx="6" fill="none" stroke="#fcd34d" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="695" y="372" text-anchor="middle" class="side-title" fill="#b45309">自主程度跨度最大</text>
  <text x="695" y="398" text-anchor="middle" class="item" fill="#92400e">从完全自研</text>
  <text x="695" y="418" text-anchor="middle" class="item" fill="#92400e">到授权/合资</text>
  <text x="695" y="438" text-anchor="middle" class="item" fill="#dc2626">争议最多</text>

  <!-- ===== 信息安全（横贯） ===== -->
  <rect x="40" y="476" width="730" height="64" rx="8" fill="url(#secGrad)" filter="url(#shadow)" stroke="#fca5a5" stroke-width="1"/>
  <text x="80" y="510" class="layer-title" fill="#991b1b">信息安全</text>
  <text x="80" y="530" class="item" fill="#7f1d1d">横贯全栈，非独立第四层</text>
  <text x="470" y="500" text-anchor="middle" class="item" fill="#7f1d1d">芯片安全 · 系统等保 · 国密算法 · 终端防护</text>
  <text x="470" y="522" text-anchor="middle" class="item" fill="#7f1d1d">奇安信 · 360 · 深信服 · 启明星辰</text>

  <!-- 安全贯穿的侧条 -->
  <rect x="22" y="86" width="10" height="454" rx="3" fill="#fca5a5" opacity="0.5"/>
  <text x="27" y="320" text-anchor="middle" font-size="14" fill="#b91c1c" transform="rotate(-90 27 320)">安全贯穿</text>

  <!-- 底部说明 -->
  <text x="400" y="580" text-anchor="middle" class="item" fill="#888">四块齐备才闭环：国产 CPU 跑外国 OS，或国产系统装 Intel 芯片，都不算自主可控</text>
</svg>
