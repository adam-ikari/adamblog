<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Noto Sans SC', 'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="dramGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="tsvGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="gpuGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="interposerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <style>
    text { fill: #e0e0e0; }
  </style>

  <text x="480" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">HBM + GPU + CoWoS：先进计算的"三明治"</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#888">HBM 通过 TSV 垂直堆叠后经硅中介层与 GPU 合封，CoWoS 封装是 AI 芯片的隐藏瓶颈</text>

  <!-- ===== HBM 堆栈 ===== -->
  <!-- DRAM 芯片堆叠 -->
  <rect x="100" y="80" width="200" height="24" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" filter="url(#shadow)"/>
  <text x="200" y="96" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">DRAM Die 8 (顶层)</text>

  <rect x="100" y="108" width="200" height="20" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.9"/>
  <text x="200" y="122" text-anchor="middle" font-size="10" fill="#bfdbfe">DRAM Die 7</text>

  <rect x="100" y="132" width="200" height="20" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.85"/>
  <text x="200" y="146" text-anchor="middle" font-size="10" fill="#bfdbfe">DRAM Die 6</text>

  <rect x="100" y="156" width="200" height="20" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.8"/>
  <rect x="100" y="180" width="200" height="20" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.75"/>
  <rect x="100" y="204" width="200" height="20" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.7"/>
  <rect x="100" y="228" width="200" height="20" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.65"/>
  <rect x="100" y="252" width="200" height="24" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.6"/>
  <text x="200" y="148" text-anchor="middle" font-size="10" fill="#999">⋮</text>
  <text x="200" y="268" text-anchor="middle" font-size="11" fill="#bfdbfe">DRAM Die 1 (底层)</text>

  <!-- TSV 标注 -->
  <line x1="230" y1="85" x2="230" y2="270" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="260" y1="85" x2="260" y2="270" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Base Die -->
  <rect x="100" y="280" width="200" height="22" rx="3" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="200" y="295" text-anchor="middle" font-size="11" fill="#cbd5e0">Base Die (逻辑控制层)</text>

  <!-- HBM 标签 -->
  <text x="200" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#60a5fa">HBM 堆栈</text>

  <!-- TSV 图例 -->
  <line x1="320" y1="90" x2="340" y2="90" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="346" y="94" font-size="10" fill="#fbbf24">TSV (硅通孔)</text>

  <!-- ===== 硅中介层 ===== -->
  <rect x="70" y="312" width="500" height="28" rx="4" fill="url(#interposerGrad)" stroke="#a78bfa" stroke-width="1" filter="url(#shadow)"/>
  <text x="320" y="330" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">硅中介层 (Silicon Interposer)</text>

  <!-- micro-bump -->
  <rect x="190" y="306" width="40" height="10" rx="2" fill="#fbbf24" opacity="0.5"/>
  <rect x="270" y="306" width="40" height="10" rx="2" fill="#fbbf24" opacity="0.5"/>
  <rect x="350" y="306" width="40" height="10" rx="2" fill="#fbbf24" opacity="0.5"/>

  <!-- ===== 封装基板 ===== -->
  <rect x="50" y="350" width="540" height="22" rx="4" fill="#334155" stroke="#475569" stroke-width="0.5"/>
  <text x="320" y="365" text-anchor="middle" font-size="11" fill="#94a3b8">封装基板 (Package Substrate)</text>

  <!-- C4 bump -->
  <rect x="100" y="346" width="30" height="8" rx="2" fill="#94a3b8" opacity="0.4"/>
  <rect x="180" y="346" width="30" height="8" rx="2" fill="#94a3b8" opacity="0.4"/>
  <rect x="280" y="346" width="30" height="8" rx="2" fill="#94a3b8" opacity="0.4"/>
  <rect x="380" y="346" width="30" height="8" rx="2" fill="#94a3b8" opacity="0.4"/>
  <rect x="460" y="346" width="30" height="8" rx="2" fill="#94a3b8" opacity="0.4"/>

  <!-- ===== GPU Die ===== -->
  <rect x="390" y="130" width="160" height="130" rx="6" fill="url(#gpuGrad)" stroke="#4ade80" stroke-width="1" filter="url(#shadow)"/>
  <text x="470" y="175" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">GPU Die</text>
  <text x="470" y="195" text-anchor="middle" font-size="11" fill="#bbf7d0">GH100 / GB100</text>
  <text x="470" y="215" text-anchor="middle" font-size="10" fill="#86efac">2080 亿晶体管</text>
  <text x="470" y="235" text-anchor="middle" font-size="10" fill="#86efac">CUDA Core + Tensor Core</text>

  <!-- NVLink 连接 GPU -->
  <line x1="550" y1="180" x2="610" y2="180" stroke="#f5a623" stroke-width="2"/>
  <text x="580" y="172" text-anchor="middle" font-size="10" fill="#f5a623">NVLink</text>
  <text x="580" y="195" text-anchor="middle" font-size="9" fill="#d97706">900 GB/s</text>

  <rect x="610" y="145" width="120" height="70" rx="6" fill="url(#gpuGrad)" stroke="#4ade80" stroke-width="0.5" opacity="0.7" filter="url(#shadow)"/>
  <text x="670" y="178" text-anchor="middle" font-size="11" fill="#bbf7d0">相邻 GPU</text>
  <text x="670" y="195" text-anchor="middle" font-size="10" fill="#86efac">NVSwitch</text>

  <!-- ===== 右侧说明 ===== -->
  <rect x="610" y="320" width="330" height="280" rx="10" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>

  <text x="630" y="350" font-size="14" font-weight="700" fill="#f5a623">为什么 HBM 是 AI 芯片的命门？</text>

  <text x="630" y="378" font-size="12" fill="#ccc">1. 大模型参数和中间激活巨大</text>
  <text x="648" y="398" font-size="11" fill="#888">GPT-3 175B 参数 = 约 700GB (FP32)</text>
  <text x="648" y="415" font-size="11" fill="#888">加上优化器状态和中间激活，单卡装不下</text>

  <text x="630" y="443" font-size="12" fill="#ccc">2. 带宽比算力更紧缺</text>
  <text x="648" y="463" font-size="11" fill="#888">GPU 算得再快，数据喂不进来也是白搭</text>
  <text x="648" y="480" font-size="11" fill="#888">普通 DDR5 带宽 ≈ 64 GB/s，HBM3e ≈ 8 TB/s</text>

  <text x="630" y="508" font-size="12" fill="#ccc">3. HBM 制造极其复杂</text>
  <text x="648" y="528" font-size="11" fill="#888">8-12 层 DRAM 垂直堆叠，TSV 穿通互连</text>
  <text x="648" y="545" font-size="11" fill="#888">全球仅 SK 海力士/三星/美光能造</text>
  <text x="648" y="562" font-size="11" fill="#f87171">中国目前无法自产 HBM</text>

  <text x="630" y="592" font-size="13" font-weight="700" fill="#e94560">HBM = 比 GPU 芯片更难替代的瓶颈</text>
</svg>
