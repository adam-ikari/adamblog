<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 660" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="dramGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="gpuGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="interposerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <style>
    text { fill: #e0e0e0; }
  </style>

  <text x="400" y="30" text-anchor="middle" font-size="27" font-weight="700" fill="#fff">HBM + GPU + CoWoS：先进计算的"三明治"</text>
  <text x="400" y="54" text-anchor="middle" font-size="18" fill="#888">HBM 通过 TSV 垂直堆叠后经硅中介层与 GPU 合封，CoWoS 是 AI 芯片的隐藏瓶颈</text>

  <!-- ===== HBM 堆栈（左侧） ===== -->
  <rect x="60" y="80" width="220" height="22" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" filter="url(#shadow)"/>
  <text x="170" y="96" text-anchor="middle" font-size="17" fill="#fff" font-weight="600">DRAM Die 8 (顶层)</text>

  <rect x="60" y="106" width="220" height="18" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.9"/>
  <rect x="60" y="128" width="220" height="18" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.85"/>
  <rect x="60" y="150" width="220" height="18" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.8"/>
  <rect x="60" y="172" width="220" height="18" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.75"/>
  <rect x="60" y="194" width="220" height="18" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.7"/>
  <rect x="60" y="216" width="220" height="18" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.65"/>
  <rect x="60" y="238" width="220" height="18" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.6"/>
  <rect x="60" y="260" width="220" height="22" rx="3" fill="url(#dramGrad)" stroke="#60a5fa" stroke-width="0.5" opacity="0.55"/>
  <text x="170" y="180" text-anchor="middle" font-size="17" fill="#999">⋮ 8-12 层 DRAM</text>
  <text x="170" y="278" text-anchor="middle" font-size="17" fill="#bfdbfe">DRAM Die 1 (底层)</text>

  <!-- TSV 线 -->
  <line x1="210" y1="85" x2="210" y2="276" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="240" y1="85" x2="240" y2="276" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Base Die -->
  <rect x="60" y="286" width="220" height="24" rx="3" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="170" y="302" text-anchor="middle" font-size="17" fill="#cbd5e0">Base Die (逻辑控制层)</text>

  <!-- HBM 标签 -->
  <text x="170" y="74" text-anchor="middle" font-size="20" font-weight="700" fill="#60a5fa">HBM 堆栈</text>

  <!-- TSV 图例 -->
  <line x1="300" y1="95" x2="325" y2="95" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="332" y="100" font-size="17" fill="#fbbf24">TSV (硅通孔)</text>

  <!-- ===== 硅中介层 ===== -->
  <rect x="30" y="320" width="470" height="28" rx="4" fill="url(#interposerGrad)" stroke="#a78bfa" stroke-width="1" filter="url(#shadow)"/>
  <text x="265" y="338" text-anchor="middle" font-size="18" fill="#fff" font-weight="600">硅中介层 (Silicon Interposer)</text>

  <!-- micro-bump -->
  <rect x="130" y="314" width="40" height="10" rx="2" fill="#fbbf24" opacity="0.5"/>
  <rect x="230" y="314" width="40" height="10" rx="2" fill="#fbbf24" opacity="0.5"/>
  <rect x="330" y="314" width="40" height="10" rx="2" fill="#fbbf24" opacity="0.5"/>

  <!-- ===== 封装基板 ===== -->
  <rect x="20" y="358" width="490" height="24" rx="4" fill="#334155" stroke="#475569" stroke-width="0.5"/>
  <text x="265" y="374" text-anchor="middle" font-size="17" fill="#94a3b8">封装基板 (Package Substrate)</text>

  <!-- C4 bump -->
  <rect x="60" y="354" width="26" height="8" rx="2" fill="#94a3b8" opacity="0.4"/>
  <rect x="130" y="354" width="26" height="8" rx="2" fill="#94a3b8" opacity="0.4"/>
  <rect x="230" y="354" width="26" height="8" rx="2" fill="#94a3b8" opacity="0.4"/>
  <rect x="340" y="354" width="26" height="8" rx="2" fill="#94a3b8" opacity="0.4"/>
  <rect x="430" y="354" width="26" height="8" rx="2" fill="#94a3b8" opacity="0.4"/>

  <!-- ===== GPU Die（右侧） ===== -->
  <rect x="360" y="130" width="180" height="140" rx="6" fill="url(#gpuGrad)" stroke="#4ade80" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="175" text-anchor="middle" font-size="21" font-weight="700" fill="#fff">GPU Die</text>
  <text x="450" y="198" text-anchor="middle" font-size="17" fill="#bbf7d0">GH100 / GB100</text>
  <text x="450" y="220" text-anchor="middle" font-size="17" fill="#86efac">2080 亿晶体管</text>
  <text x="450" y="242" text-anchor="middle" font-size="17" fill="#86efac">CUDA Core + Tensor Core</text>

  <!-- NVLink -->
  <line x1="540" y1="190" x2="590" y2="190" stroke="#f5a623" stroke-width="2"/>
  <text x="565" y="182" text-anchor="middle" font-size="15" fill="#f5a623">NVLink</text>
  <text x="565" y="200" text-anchor="middle" font-size="14" fill="#d97706">900 GB/s</text>

  <rect x="590" y="145" width="130" height="110" rx="6" fill="url(#gpuGrad)" stroke="#4ade80" stroke-width="0.5" opacity="0.6" filter="url(#shadow)"/>
  <text x="655" y="190" text-anchor="middle" font-size="17" fill="#bbf7d0">相邻 GPU</text>
  <text x="655" y="210" text-anchor="middle" font-size="15" fill="#86efac">NVSwitch</text>
  <text x="655" y="235" text-anchor="middle" font-size="15" fill="#86efac">全互联拓扑</text>

  <!-- ===== 右侧说明 ===== -->
  <rect x="30" y="410" width="740" height="220" rx="10" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>

  <text x="55" y="440" font-size="22" font-weight="700" fill="#f5a623">为什么 HBM 是 AI 芯片的命门？</text>

  <text x="55" y="472" font-size="20" fill="#ccc">1. 大模型参数和中间激活巨大</text>
  <text x="78" y="494" font-size="17" fill="#888">GPT-3 175B 参数 ≈ 700GB (FP32)，加上优化器状态和中间激活，单卡装不下</text>

  <text x="55" y="526" font-size="20" fill="#ccc">2. 带宽比算力更紧缺</text>
  <text x="78" y="548" font-size="17" fill="#888">GPU 算得再快，数据喂不进来也是白搭。普通 DDR5 带宽 ≈ 64 GB/s，HBM3e ≈ 8 TB/s</text>

  <text x="55" y="580" font-size="20" fill="#ccc">3. HBM 制造极其复杂 — 8-12 层 DRAM 垂直堆叠，TSV 穿通互连。全球仅 SK 海力士/三星/美光能造</text>
  <text x="78" y="602" font-size="17" fill="#f87171">中国目前无法自产 HBM</text>

  <text x="55" y="630" font-size="21" font-weight="700" fill="#e94560">HBM = 比 GPU 芯片更难替代的瓶颈</text>
</svg>
