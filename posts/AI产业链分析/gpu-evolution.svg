<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="barA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="barH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="barR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    text { fill: #333333; }
  </style>

  <text x="400" y="30" text-anchor="middle" font-size="27" font-weight="700" fill="#1a1a1a">NVIDIA 数据中心 GPU 演进：2020—2026</text>
  <text x="400" y="54" text-anchor="middle" font-size="18" fill="#666">从 A100 到 Vera Rubin，六年 FP16 算力 ×15、显存带宽 ×6、晶体管数 ×5+</text>

  <!-- ===== 算力对比 ===== -->
  <text x="30" y="100" font-size="21" font-weight="700" fill="#d97706">Tensor Core FP16 算力 (TFLOPS / PFLOPS)</text>

  <rect x="30" y="112" width="70" height="30" rx="4" fill="url(#barA)" filter="url(#shadow)"/>
  <text x="110" y="132" font-size="18" fill="#333" font-weight="600">A100: 312 TF</text>

  <rect x="30" y="154" width="222" height="30" rx="4" fill="url(#barH)" filter="url(#shadow)"/>
  <text x="262" y="174" font-size="18" fill="#333" font-weight="600">H100/200: 990 TF</text>

  <rect x="30" y="196" width="444" height="30" rx="4" fill="url(#barH)" filter="url(#shadow)"/>
  <text x="484" y="216" font-size="18" fill="#333" font-weight="600">B100: 1.98 PF</text>

  <rect x="30" y="238" width="506" height="30" rx="4" fill="url(#barB)" filter="url(#shadow)"/>
  <text x="546" y="258" font-size="18" fill="#333" font-weight="600">B200: 2.25 PF (×7 vs A100)</text>

  <rect x="30" y="280" width="606" height="30" rx="4" fill="url(#barB)" filter="url(#shadow)"/>
  <text x="646" y="300" font-size="18" fill="#333" font-weight="600">B300/GB300: ~2.7 PF</text>

  <rect x="30" y="322" width="742" height="30" rx="4" fill="url(#barR)" filter="url(#shadow)"/>
  <text x="30" y="354" font-size="18" fill="#333" font-weight="600">Vera Rubin: ~3.3 PF (估算, ×15 vs A100, 2026 H2)</text>

  <line x1="30" y1="370" x2="772" y2="370" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="30" y="388" font-size="17" fill="#777">0</text>
  <text x="260" y="388" font-size="17" fill="#777">1 PF</text>
  <text x="490" y="388" font-size="17" fill="#777">2 PF</text>
  <text x="720" y="388" font-size="17" fill="#777">3 PF</text>

  <!-- ===== 显存带宽 ===== -->
  <text x="30" y="440" font-size="21" font-weight="700" fill="#0891b2">显存带宽 (TB/s)</text>

  <rect x="30" y="452" width="133" height="30" rx="4" fill="url(#barA)" filter="url(#shadow)"/>
  <text x="173" y="472" font-size="18" fill="#333" font-weight="600">A100: 2.0 (HBM2e)</text>

  <rect x="30" y="494" width="223" height="30" rx="4" fill="url(#barA)" filter="url(#shadow)"/>
  <text x="263" y="514" font-size="18" fill="#333" font-weight="600">H100: 3.35 (HBM3)</text>

  <rect x="30" y="536" width="320" height="30" rx="4" fill="url(#barH)" filter="url(#shadow)"/>
  <text x="360" y="556" font-size="18" fill="#333" font-weight="600">H200: 4.8 (HBM3e)</text>

  <rect x="30" y="578" width="533" height="30" rx="4" fill="url(#barB)" filter="url(#shadow)"/>
  <text x="573" y="598" font-size="18" fill="#333" font-weight="600">B200/GB300: 8.0 (HBM3e, ×4 vs A100)</text>

  <rect x="30" y="620" width="667" height="30" rx="4" fill="url(#barR)" filter="url(#shadow)"/>
  <text x="30" y="652" font-size="18" fill="#333" font-weight="600">Vera Rubin: ~10+ TB/s (HBM4, 估算, 2026 H2)</text>

  <line x1="30" y1="668" x2="697" y2="668" stroke="#cbd5e1" stroke-width="0.5"/>
  <text x="30" y="686" font-size="17" fill="#777">0</text>
  <text x="365" y="686" font-size="17" fill="#777">5</text>
  <text x="697" y="686" font-size="17" fill="#777">10 TB/s</text>

  <!-- ===== 晶体管数 ===== -->
  <text x="30" y="738" font-size="21" font-weight="700" fill="#7c3aed">晶体管数 (亿)</text>

  <rect x="30" y="750" width="169" height="30" rx="4" fill="url(#barA)" filter="url(#shadow)"/>
  <text x="209" y="770" font-size="18" fill="#333" font-weight="600">A100: 540 亿 (TSMC 7nm)</text>

  <rect x="30" y="792" width="250" height="30" rx="4" fill="url(#barH)" filter="url(#shadow)"/>
  <text x="290" y="812" font-size="18" fill="#333" font-weight="600">H100/200: 800 亿 (TSMC 4N)</text>

  <rect x="30" y="834" width="650" height="30" rx="4" fill="url(#barB)" filter="url(#shadow)"/>
  <text x="690" y="854" font-size="18" fill="#333" font-weight="600">B100/200: 2,080 亿 (TSMC 4NP, ×4 vs A100)</text>

  <rect x="30" y="876" width="758" height="30" rx="4" fill="url(#barR)" filter="url(#shadow)"/>
  <text x="30" y="908" font-size="18" fill="#333" font-weight="600">Vera Rubin: 估 >3,000 亿 (TSMC 3nm, ×5+ vs A100, 2026 H2)</text>
</svg>
