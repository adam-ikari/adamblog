<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1050" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="appGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="modelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="frameworkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="computeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="infraGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L5,10 L10,0" fill="#6366f1" opacity="0.6"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <style>
    text { fill: #333333; }
    .title { font-size: 27px; font-weight: 700; fill: #1a1a1a; }
    .layer-title { font-size: 22px; font-weight: 700; }
    .layer-sub { font-size: 18px; }
    .layer-detail { font-size: 17px; fill: #555555; }
    .label { font-size: 17px; fill: #555555; }
    .small { font-size: 15px; fill: #666666; }
    .cn-title { font-size: 18px; font-weight: 600; }
    .cn-text { font-size: 17px; }
    .bottleneck-title { font-size: 21px; font-weight: 700; }
  </style>

  <text x="400" y="34" text-anchor="middle" class="title">AI 产业链全景：六层依赖关系</text>

  <!-- ===== 应用层 ===== -->
  <rect x="30" y="58" width="560" height="104" rx="8" fill="url(#appGrad)" filter="url(#shadow)" stroke="#67e8f9" stroke-width="0.5"/>
  <text x="310" y="88" text-anchor="middle" class="layer-title" fill="#0c4a6e">应用层</text>
  <text x="310" y="112" text-anchor="middle" class="layer-sub" fill="#155e75">ChatGPT · Copilot · Kimi · 豆包 · Agent · RAG · 行业应用</text>
  <text x="310" y="136" text-anchor="middle" class="layer-detail">ToB 政企 / ToC 对话 / Agent 自主任务</text>

  <!-- 右侧标注 -->
  <rect x="610" y="58" width="160" height="104" rx="6" fill="none" stroke="#67e8f9" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="690" y="86" text-anchor="middle" class="cn-title" fill="#0e7490">🇨🇳 字节豆包 · Kimi</text>
  <text x="690" y="110" text-anchor="middle" class="cn-text" fill="#155e75">WPS AI · 政企大模型</text>
  <text x="690" y="134" text-anchor="middle" class="cn-text" fill="#0e7490">应用层有竞争力</text>

  <!-- 应用→模型 -->
  <line x1="310" y1="162" x2="310" y2="194" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="326" y="182" class="small">调用 API</text>

  <!-- ===== 模型层 ===== -->
  <rect x="30" y="198" width="560" height="104" rx="8" fill="url(#modelGrad)" filter="url(#shadow)" stroke="#c4b5fd" stroke-width="0.5"/>
  <text x="310" y="228" text-anchor="middle" class="layer-title" fill="#4c1d95">模型层</text>
  <text x="310" y="252" text-anchor="middle" class="layer-sub" fill="#5b21b6">GPT-5 · Llama 4 · DeepSeek-V3/R1 · Gemini · 通义 · GLM</text>
  <text x="310" y="276" text-anchor="middle" class="layer-detail">Dense / MoE 架构 · 训练 (6N FLOPs/token) · 推理服务</text>

  <rect x="610" y="198" width="160" height="104" rx="6" fill="none" stroke="#c4b5fd" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="690" y="226" text-anchor="middle" class="cn-title" fill="#6d28d9">🇨🇳 DeepSeek · 通义</text>
  <text x="690" y="250" text-anchor="middle" class="cn-text" fill="#5b21b6">GLM · 文心 · 豆包</text>
  <text x="690" y="274" text-anchor="middle" class="cn-text" fill="#6d28d9">模型层可竞争</text>

  <!-- 模型→框架 -->
  <line x1="310" y1="302" x2="310" y2="334" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="326" y="322" class="small">依赖训练框架</text>

  <!-- ===== 框架层 ===== -->
  <rect x="30" y="338" width="560" height="104" rx="8" fill="url(#frameworkGrad)" filter="url(#shadow)" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="310" y="368" text-anchor="middle" class="layer-title" fill="#991b1b">框架与工具链</text>
  <text x="310" y="392" text-anchor="middle" class="layer-sub" fill="#b91c1c">PyTorch · CUDA · cuDNN/cuBLAS · JAX · MindSpore</text>
  <text x="310" y="416" text-anchor="middle" class="layer-detail">PyTorch → cuDNN → CUDA → GPU 锁定链</text>

  <rect x="610" y="338" width="160" height="104" rx="6" fill="none" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="690" y="366" text-anchor="middle" class="cn-title" fill="#b91c1c">🇨🇳 MindSpore · PaddlePaddle</text>
  <text x="690" y="390" text-anchor="middle" class="cn-text" fill="#dc2626">PyTorch 昇腾适配</text>
  <text x="690" y="414" text-anchor="middle" class="cn-text" fill="#dc2626">框架层短板</text>

  <!-- 框架→算力 -->
  <line x1="310" y1="442" x2="310" y2="474" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="326" y="462" class="small">CUDA 绑定硬件</text>

  <!-- ===== 算力层 ===== -->
  <rect x="30" y="478" width="560" height="126" rx="8" fill="url(#computeGrad)" filter="url(#shadow)" stroke="#fcd34d" stroke-width="0.5"/>
  <text x="310" y="508" text-anchor="middle" class="layer-title">算力层（GPU / AI 芯片）</text>
  <text x="310" y="534" text-anchor="middle" class="layer-sub" fill="#92400e">H100/B200 · 昇腾 910B · MI300X · 寒武纪 · 海光 DCU</text>
  <text x="310" y="558" text-anchor="middle" class="layer-detail">CUDA Core + Tensor Core · HBM 显存 · NVLink 互联 · 液冷</text>
  <!-- 隐藏供应链条 -->
  <rect x="55" y="574" width="510" height="20" rx="5" fill="#fef3c7" opacity="0.6"/>
  <text x="310" y="588" text-anchor="middle" font-size="15" fill="#92400e">隐藏供应链：HBM（SK海力士/三星/美光）· CoWoS（台积电）· PCB 20+层 · MLCC · 电源</text>

  <rect x="610" y="478" width="160" height="126" rx="6" fill="none" stroke="#fcd34d" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="690" y="510" text-anchor="middle" class="cn-title" fill="#b45309">🇨🇳 昇腾 · 寒武纪</text>
  <text x="690" y="536" text-anchor="middle" class="cn-text" fill="#d97706">海光 DCU · 壁仞</text>
  <text x="690" y="562" text-anchor="middle" class="cn-text" fill="#dc2626">算力层最被卡</text>

  <!-- 算力→基础设施 -->
  <line x1="310" y1="604" x2="310" y2="636" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="326" y="624" class="small">GPU 装入数据中心</text>

  <!-- ===== 基础设施层 ===== -->
  <rect x="30" y="640" width="560" height="96" rx="8" fill="url(#infraGrad)" filter="url(#shadow)" stroke="#86efac" stroke-width="0.5"/>
  <text x="310" y="670" text-anchor="middle" class="layer-title" fill="#166534">基础设施层</text>
  <text x="310" y="696" text-anchor="middle" class="layer-sub" fill="#15803d">AWS · Azure · Google Cloud · 阿里云 · 华为云 · 智算中心</text>
  <text x="310" y="720" text-anchor="middle" class="layer-detail">InfiniBand · CPO 光互联 · 液冷数据中心 · 供电/散热/网络</text>

  <rect x="610" y="640" width="160" height="96" rx="6" fill="none" stroke="#86efac" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="690" y="668" text-anchor="middle" class="cn-title" fill="#166534">🇨🇳 阿里云 · 华为云</text>
  <text x="690" y="692" text-anchor="middle" class="cn-text" fill="#15803d">腾讯云 · 各地智算中心</text>
  <text x="690" y="716" text-anchor="middle" class="cn-text" fill="#15803d">重资产投入</text>

  <!-- ===== 数据层（底部横条） ===== -->
  <rect x="30" y="766" width="740" height="40" rx="6" fill="url(#dataGrad)" filter="url(#shadow)" stroke="#a5b4fc" stroke-width="0.5"/>
  <text x="400" y="792" text-anchor="middle" font-size="20" font-weight="700" fill="#312e81">数据层贯穿全程：训练语料 → 合成数据 → 专有数据 → 多模态 → 用户反馈 → 合规审查</text>

  <!-- ===== 三个全局瓶颈 ===== -->
  <rect x="30" y="832" width="230" height="90" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="145" y="862" text-anchor="middle" class="bottleneck-title" fill="#dc2626">🔒 算力墙</text>
  <text x="145" y="886" text-anchor="middle" font-size="17" fill="#444">GPU + 先进制程 + HBM</text>
  <text x="145" y="908" text-anchor="middle" font-size="17" fill="#444">集中在英伟达+台积电</text>

  <rect x="285" y="832" width="230" height="90" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="400" y="862" text-anchor="middle" class="bottleneck-title" fill="#d97706">📊 数据墙</text>
  <text x="400" y="886" text-anchor="middle" font-size="17" fill="#444">高质量语料趋近枯竭</text>
  <text x="400" y="908" text-anchor="middle" font-size="17" fill="#444">合成数据效果待验证</text>

  <rect x="540" y="832" width="230" height="90" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="655" y="862" text-anchor="middle" class="bottleneck-title" fill="#059669">⚡ 能耗墙</text>
  <text x="655" y="886" text-anchor="middle" font-size="17" fill="#444">GB200 NVL72 单柜 140kW</text>
  <text x="655" y="908" text-anchor="middle" font-size="17" fill="#444">供电成新约束</text>

  <!-- 左侧：数据层纵向贯穿效果 -->
  <rect x="15" y="58" width="10" height="682" rx="3" fill="#818cf8" opacity="0.12"/>
</svg>
