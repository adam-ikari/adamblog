<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 980" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="nvGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="ascendGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="cambriconGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="nvArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#3b82f6"/>
    </marker>
    <marker id="cnArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#d97706"/>
    </marker>
  </defs>

  <style>
    text { fill: #333333; }
    .col-title { font-size: 22px; font-weight: 700; }
    .col-sub { font-size: 17px; }
    .section { font-size: 19px; font-weight: 700; fill: #d97706; }
    .item { font-size: 18px; }
    .item-sub { font-size: 15px; }
    .good { fill: #16a34a; font-weight: 600; }
    .warn { fill: #d97706; }
    .bad { fill: #dc2626; }
  </style>

  <text x="400" y="32" text-anchor="middle" font-size="27" font-weight="700" fill="#1a1a1a">国产 AI 算力 vs NVIDIA CUDA：全栈对比</text>
  <text x="400" y="56" text-anchor="middle" font-size="18" fill="#666">本质差异不在硬件架构，在软件生态——"原生" 还是 "翻译"？</text>

  <!-- ===== NVIDIA CUDA 列 ===== -->
  <rect x="20" y="74" width="240" height="820" rx="10" fill="url(#nvGrad)" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="74" width="240" height="44" rx="10" fill="#bfdbfe"/>
  <rect x="20" y="104" width="240" height="14" fill="#bfdbfe"/>
  <text x="140" y="100" text-anchor="middle" class="col-title" fill="#1e40af">NVIDIA CUDA</text>
  <text x="140" y="138" text-anchor="middle" class="col-sub" fill="#3b82f6">全球标杆 · 19 年积累</text>

  <text x="35" y="170" class="section">框架接入</text>
  <rect x="35" y="180" width="210" height="48" rx="6" fill="#dbeafe"/>
  <text x="140" y="200" text-anchor="middle" class="item" fill="#1e40af">PyTorch / JAX / TF</text>
  <text x="140" y="220" text-anchor="middle" class="item-sub" fill="#3b82f6">原生支持，零适配</text>
  <line x1="140" y1="228" x2="140" y2="246" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#nvArrow)"/>

  <rect x="35" y="250" width="210" height="48" rx="6" fill="#dbeafe"/>
  <text x="140" y="270" text-anchor="middle" class="item" fill="#1e40af">cuDNN / cuBLAS</text>
  <text x="140" y="290" text-anchor="middle" class="item-sub" fill="#3b82f6">深度优化算子库（19年）</text>
  <line x1="140" y1="298" x2="140" y2="316" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#nvArrow)"/>

  <rect x="35" y="320" width="210" height="48" rx="6" fill="#dbeafe"/>
  <text x="140" y="340" text-anchor="middle" class="item" fill="#1e40af">CUDA 平台 + 工具链</text>
  <text x="140" y="360" text-anchor="middle" class="item-sub" fill="#3b82f6">nvcc · Nsight · PTX</text>

  <text x="35" y="402" class="section">硬件平台</text>
  <rect x="35" y="412" width="210" height="58" rx="6" fill="#dcfce7"/>
  <text x="140" y="432" text-anchor="middle" class="item" fill="#166534">H100→B200→B300</text>
  <text x="140" y="452" text-anchor="middle" class="item-sub" fill="#16a34a">→ Vera Rubin (2026)</text>
  <text x="140" y="465" text-anchor="middle" class="item-sub" fill="#16a34a">990TF→2.25PF→~3.3PF</text>

  <rect x="35" y="478" width="210" height="48" rx="6" fill="#dcfce7"/>
  <text x="140" y="498" text-anchor="middle" class="item" fill="#166534">HBM3e → HBM4</text>
  <text x="140" y="518" text-anchor="middle" class="item-sub" fill="#16a34a">8 TB/s → 10+ TB/s</text>

  <text x="35" y="560" class="section">制程与封装</text>
  <text x="140" y="586" text-anchor="middle" class="item good">TSMC 4NP → 3nm</text>
  <text x="140" y="608" text-anchor="middle" class="item-sub" fill="#16a34a">CoWoS-L · NV-HBI 桥接</text>

  <text x="35" y="650" class="section">生态成熟度</text>
  <rect x="35" y="662" width="210" height="14" rx="3" fill="#22c55e"/>
  <text x="140" y="698" text-anchor="middle" class="item good">100% 算子覆盖</text>
  <text x="140" y="720" text-anchor="middle" class="item-sub" fill="#666">论文、开源模型直跑</text>

  <text x="35" y="762" class="section">互联</text>
  <text x="140" y="788" text-anchor="middle" class="item good">NVLink 5.0: 1.8 TB/s</text>
  <text x="140" y="810" text-anchor="middle" class="item-sub" fill="#16a34a">NVSwitch + InfiniBand</text>

  <text x="35" y="842" class="section">调用路径</text>
  <text x="140" y="868" text-anchor="middle" class="item good" font-size="15">PyTorch→cuDNN→CUDA→GPU</text>
  <text x="140" y="888" text-anchor="middle" class="item-sub" fill="#16a34a">原生路径，零翻译</text>

  <!-- ===== 昇腾 列 ===== -->
  <rect x="280" y="74" width="240" height="820" rx="10" fill="url(#ascendGrad)" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="280" y="74" width="240" height="44" rx="10" fill="#ddd6fe"/>
  <rect x="280" y="104" width="240" height="14" fill="#ddd6fe"/>
  <text x="400" y="100" text-anchor="middle" class="col-title" fill="#5b21b6">华为昇腾 910B/C</text>
  <text x="400" y="138" text-anchor="middle" class="col-sub" fill="#7c3aed">自研 Da Vinci 架构</text>

  <text x="295" y="170" class="section">框架接入</text>
  <rect x="295" y="180" width="210" height="48" rx="6" fill="#ede9fe"/>
  <text x="400" y="200" text-anchor="middle" class="item" fill="#5b21b6">PyTorch 2.x (torch_npu)</text>
  <text x="400" y="220" text-anchor="middle" class="item-sub warn">⚠ 适配层翻译 CUDA 算子</text>
  <line x1="400" y1="228" x2="400" y2="246" stroke="#d97706" stroke-width="1.5" marker-end="url(#cnArrow)"/>

  <rect x="295" y="250" width="210" height="68" rx="6" fill="#ede9fe"/>
  <text x="400" y="270" text-anchor="middle" class="item" fill="#5b21b6">CANN 异构计算架构</text>
  <text x="400" y="290" text-anchor="middle" class="item-sub" fill="#7c3aed">AscendCL · 图编译 GE</text>
  <text x="400" y="310" text-anchor="middle" class="item-sub" fill="#7c3aed">融合算子 · HCCL 通信</text>
  <line x1="400" y1="318" x2="400" y2="336" stroke="#d97706" stroke-width="1.5" marker-end="url(#cnArrow)"/>

  <rect x="295" y="340" width="210" height="68" rx="6" fill="#ede9fe"/>
  <text x="400" y="360" text-anchor="middle" class="item" fill="#5b21b6">MindSpore + MindSpeed</text>
  <text x="400" y="380" text-anchor="middle" class="item-sub" fill="#7c3aed">MindSpore: 自研框架</text>
  <text x="400" y="400" text-anchor="middle" class="item-sub" fill="#7c3aed">MindSpeed: 分布式加速</text>

  <text x="295" y="442" class="section">硬件平台</text>
  <rect x="295" y="452" width="210" height="68" rx="6" fill="#dcfce7"/>
  <text x="400" y="472" text-anchor="middle" class="item" fill="#166534">910B: ~400 TF FP16</text>
  <text x="400" y="492" text-anchor="middle" class="item-sub" fill="#16a34a">910C: 提升 ~40-60%</text>
  <text x="400" y="512" text-anchor="middle" class="item-sub" fill="#16a34a">Atlas 800T A2/A3</text>

  <rect x="295" y="528" width="210" height="48" rx="6" fill="#dcfce7"/>
  <text x="400" y="548" text-anchor="middle" class="item" fill="#166534">HBM2e + HCCS 互联</text>
  <text x="400" y="568" text-anchor="middle" class="item-sub" fill="#16a34a">~1.5-2.0 TB/s 带宽</text>

  <text x="295" y="610" class="section">制程与封装</text>
  <text x="400" y="636" text-anchor="middle" class="item bad">SMIC N+2 (~7nm)</text>
  <text x="400" y="658" text-anchor="middle" class="item-sub" fill="#dc2626">受出口管制 · 良率受限</text>

  <text x="295" y="700" class="section">生态成熟度</text>
  <rect x="322" y="712" width="156" height="14" rx="3" fill="#d97706"/>
  <text x="400" y="748" text-anchor="middle" class="item warn">~70-80% 算子覆盖</text>
  <text x="400" y="770" text-anchor="middle" class="item-sub" fill="#666">追不上 PyTorch 发版</text>

  <text x="295" y="812" class="section">互联</text>
  <text x="400" y="838" text-anchor="middle" class="item warn">HCCS: ~400 GB/s</text>
  <text x="400" y="860" text-anchor="middle" class="item-sub" fill="#dc2626">约为 NVLink 的 1/4</text>

  <text x="295" y="842" class="section">调用路径</text>
  <text x="400" y="868" text-anchor="middle" class="item warn" font-size="15">PyTorch→torch_npu→CANN→昇腾</text>
  <text x="400" y="888" text-anchor="middle" class="item-sub" fill="#dc2626">多一层翻译，性能有损</text>

  <!-- ===== 寒武纪 列 ===== -->
  <rect x="540" y="74" width="240" height="820" rx="10" fill="url(#cambriconGrad)" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="540" y="74" width="240" height="44" rx="10" fill="#bbf7d0"/>
  <rect x="540" y="104" width="240" height="14" fill="#bbf7d0"/>
  <text x="660" y="100" text-anchor="middle" class="col-title" fill="#166534">寒武纪 MLU</text>
  <text x="660" y="138" text-anchor="middle" class="col-sub" fill="#16a34a">自研 MLU · 存算一体</text>

  <text x="555" y="170" class="section">框架接入</text>
  <rect x="555" y="180" width="210" height="48" rx="6" fill="#dcfce7"/>
  <text x="660" y="200" text-anchor="middle" class="item" fill="#166534">PyTorch (torch_mlu)</text>
  <text x="660" y="220" text-anchor="middle" class="item-sub warn">⚠ 适配层翻译 CUDA 算子</text>
  <line x1="660" y1="228" x2="660" y2="246" stroke="#d97706" stroke-width="1.5" marker-end="url(#cnArrow)"/>

  <rect x="555" y="250" width="210" height="48" rx="6" fill="#dcfce7"/>
  <text x="660" y="270" text-anchor="middle" class="item" fill="#166534">Cambricon Neuware</text>
  <text x="660" y="290" text-anchor="middle" class="item-sub" fill="#16a34a">BANG 语言 · CNML 库</text>
  <line x1="660" y1="298" x2="660" y2="316" stroke="#d97706" stroke-width="1.5" marker-end="url(#cnArrow)"/>

  <rect x="555" y="320" width="210" height="48" rx="6" fill="#dcfce7"/>
  <text x="660" y="340" text-anchor="middle" class="item" fill="#166534">BANG C 编程模型</text>
  <text x="660" y="360" text-anchor="middle" class="item-sub" fill="#16a34a">对标 CUDA C 并行模型</text>

  <text x="555" y="402" class="section">硬件平台</text>
  <rect x="555" y="412" width="210" height="48" rx="6" fill="#dcfce7"/>
  <text x="660" y="432" text-anchor="middle" class="item" fill="#166534">思元 370/590</text>
  <text x="660" y="452" text-anchor="middle" class="item-sub" fill="#16a34a">MLU 架构 · 专用加速</text>

  <rect x="555" y="468" width="210" height="48" rx="6" fill="#dcfce7"/>
  <text x="660" y="488" text-anchor="middle" class="item" fill="#166534">国产 HBM 替代方案</text>
  <text x="660" y="508" text-anchor="middle" class="item-sub bad">HBM 受管制 · 替代有限</text>

  <text x="555" y="550" class="section">制程与封装</text>
  <text x="660" y="576" text-anchor="middle" class="item bad">SMIC N+2 (~7nm)</text>
  <text x="660" y="598" text-anchor="middle" class="item-sub" fill="#dc2626">实体清单 · 制程受限</text>

  <text x="555" y="640" class="section">生态成熟度</text>
  <rect x="602" y="652" width="116" height="14" rx="3" fill="#dc2626"/>
  <text x="660" y="688" text-anchor="middle" class="item bad">~50-60% 算子覆盖</text>
  <text x="660" y="710" text-anchor="middle" class="item-sub" fill="#666">生态最小 · 信创驱动</text>

  <text x="555" y="752" class="section">互联</text>
  <text x="660" y="778" text-anchor="middle" class="item bad">自研互联 · 规模有限</text>
  <text x="660" y="800" text-anchor="middle" class="item-sub" fill="#dc2626">多卡扩展能力受限</text>

  <text x="555" y="842" class="section">调用路径</text>
  <text x="660" y="868" text-anchor="middle" class="item warn" font-size="15">PyTorch→torch_mlu→Neuware→MLU</text>
  <text x="660" y="888" text-anchor="middle" class="item-sub" fill="#dc2626">生态最小，兼容最弱</text>
</svg>
