<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="ylGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="nsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1a4e"/>
      <stop offset="100%" stop-color="#1a0a30"/>
    </linearGradient>
    <linearGradient id="ykGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d4a2e"/>
      <stop offset="100%" stop-color="#0a1a10"/>
    </linearGradient>
    <linearGradient id="okGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a2020"/>
      <stop offset="100%" stop-color="#2a1010"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#667eea"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <style>
    text { fill: #e0e0e0; }
    .node-title { font-size: 21px; font-weight: 700; fill: #fff; }
    .node-sub { font-size: 15px; }
    .branch-label { font-size: 17px; fill: #f5a623; font-weight: 600; }
    .anno { font-size: 15px; fill: #888; }
  </style>

  <text x="400" y="32" text-anchor="middle" font-size="27" font-weight="700" fill="#fff">麒麟操作系统家族</text>
  <text x="400" y="56" text-anchor="middle" font-size="18" fill="#888">四系同源，三条路线：党政信创 / 社区开源 / 消费桌面</text>

  <!-- ===== 顶部：麒麟软件 ===== -->
  <rect x="280" y="78" width="240" height="50" rx="10" fill="#1a1a2e" stroke="#667eea" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="100" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">麒麟软件 (Kylinsoft)</text>
  <text x="400" y="120" text-anchor="middle" font-size="15" fill="#667eea">2019 中标 + 银河合并 · 中国电子 (CEC) 旗下</text>

  <!-- 连接线 -->
  <line x1="340" y1="128" x2="260" y2="168" stroke="#667eea" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="128" x2="400" y2="168" stroke="#667eea" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="128" x2="540" y2="168" stroke="#667eea" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 三条分支 ===== -->

  <!-- 银河麒麟 (中) -->
  <rect x="300" y="172" width="200" height="130" rx="10" fill="url(#ylGrad)" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="200" text-anchor="middle" class="node-title" fill="#60a5fa">银河麒麟 V10</text>
  <text x="400" y="222" text-anchor="middle" class="node-sub" fill="#93c5fd">KylinOS · 党政信创主力</text>
  <text x="400" y="244" text-anchor="middle" class="branch-label">桌面版 + 服务器版</text>
  <text x="400" y="264" text-anchor="middle" class="anno">Linux 5.10 内核 · 国产化率最高</text>
  <text x="400" y="284" text-anchor="middle" class="anno">飞腾/鲲鹏/海光/兆芯/龙芯/申威</text>
  <text x="400" y="302" text-anchor="middle" class="anno" fill="#22c55e">→ 信创采购主力，市场份额第一</text>

  <!-- 中标麒麟 (左) -->
  <rect x="60" y="172" width="210" height="130" rx="10" fill="url(#nsGrad)" stroke="#a78bfa" stroke-width="1" filter="url(#shadow)"/>
  <text x="165" y="200" text-anchor="middle" class="node-title" fill="#c4b5fd">中标麒麟</text>
  <text x="165" y="222" text-anchor="middle" class="node-sub" fill="#a78bfa">NeoKylin · 前身/过渡品牌</text>
  <text x="165" y="244" text-anchor="middle" class="branch-label">已逐步整合进银河</text>
  <text x="165" y="264" text-anchor="middle" class="anno">早期政府采购体系核心</text>
  <text x="165" y="284" text-anchor="middle" class="anno">FreeBSD 起点，后迁至 Linux</text>
  <text x="165" y="302" text-anchor="middle" class="anno" fill="#888">→ 品牌淡化，存量替代中</text>

  <!-- 优麒麟 (右) -->
  <rect x="530" y="172" width="210" height="130" rx="10" fill="url(#ykGrad)" stroke="#4ade80" stroke-width="1" filter="url(#shadow)"/>
  <text x="635" y="200" text-anchor="middle" class="node-title" fill="#86efac">优麒麟</text>
  <text x="635" y="222" text-anchor="middle" class="node-sub" fill="#4ade80">UbuntuKylin · 社区开源版</text>
  <text x="635" y="244" text-anchor="middle" class="branch-label">Ubuntu 衍生，面向消费</text>
  <text x="635" y="264" text-anchor="middle" class="anno">UKUI 桌面环境（自研）</text>
  <text x="635" y="284" text-anchor="middle" class="anno">软件商店 · 个人用户</text>
  <text x="635" y="302" text-anchor="middle" class="anno" fill="#888">→ 社区活跃度一般</text>

  <!-- 连接线到 openKylin -->
  <line x1="300" y1="302" x2="235" y2="370" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="500" y1="302" x2="565" y2="370" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- ===== openKylin ===== -->
  <rect x="220" y="374" width="360" height="60" rx="10" fill="url(#okGrad)" stroke="#e94560" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="400" text-anchor="middle" class="node-title" fill="#fca5a5">openKylin</text>
  <text x="400" y="420" text-anchor="middle" class="node-sub" fill="#f87171">2022 年开源 · 独立社区治理 · 银河麒麟的上游</text>
  <text x="400" y="436" text-anchor="middle" class="anno">→ 银河麒麟从 openKylin 取社区贡献，再叠加商业增强层</text>

  <!-- 连接线到 openKylin -->
  <line x1="400" y1="434" x2="400" y2="464" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 底部：关系说明 ===== -->
  <rect x="30" y="470" width="740" height="65" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
  <text x="60" y="496" font-size="18" fill="#ccc">• 银河麒麟 V10 是信创采购主力，桌面版 + 服务器版双线，内核 Linux 5.10，支持六大国产 CPU</text>
  <text x="60" y="518" font-size="18" fill="#ccc">• 中标麒麟是前身品牌，已逐步整合进银河；优麒麟 (UbuntuKylin) 走社区开源路线，面向个人用户</text>
  <text x="60" y="536" font-size="18" fill="#ccc">• openKylin 2022 年开源，定位为银河麒麟的上游社区，实现"社区开源→商业发行"的循环</text>
</svg>
