<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#dbeafe"/><stop offset="100%" stop-color="#bfdbfe"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#bbf7d0"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fde68a"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#ddd6fe"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#6366f1"/></marker>
  </defs>
  <style>
    text { fill: #333333; }
    .title { font-size: 26px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 17px; fill: #666; }
    .step { font-size: 18px; font-weight: 700; }
    .desc { font-size: 14px; fill: #555; }
    .note { font-size: 13px; fill: #666; }
  </style>
  <text x="400" y="30" text-anchor="middle" class="title">macOS 开发环境准备流程</text>
  <text x="400" y="52" text-anchor="middle" class="sub">包管理 → Node.js → 终端 → Git，四件套配齐开干</text>

  <rect x="20" y="80" width="170" height="160" rx="8" fill="url(#g1)" stroke="#93c5fd" stroke-width="1" filter="url(#sh)"/>
  <text x="105" y="108" text-anchor="middle" class="step" fill="#1e40af">① Homebrew</text>
  <line x1="40" y1="120" x2="170" y2="120" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="35" y="144" class="desc">包管理器</text>
  <text x="35" y="166" class="note">brew install</text>
  <text x="35" y="186" class="note">brew cask</text>
  <text x="35" y="206" class="note">装 GUI 应用</text>
  <text x="35" y="226" class="note">后续依赖它</text>

  <line x1="190" y1="160" x2="210" y2="160" stroke="#6366f1" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="210" y="80" width="170" height="160" rx="8" fill="url(#g2)" stroke="#86efac" stroke-width="1" filter="url(#sh)"/>
  <text x="295" y="108" text-anchor="middle" class="step" fill="#166534">② Node.js</text>
  <line x1="230" y1="120" x2="360" y2="120" stroke="#86efac" stroke-width="0.5"/>
  <text x="225" y="144" class="desc">JS 运行时</text>
  <text x="225" y="166" class="note">方式一: brew</text>
  <text x="225" y="186" class="note">方式二: nvm(推荐)</text>
  <text x="225" y="206" class="note">配 npm 镜像源</text>
  <text x="225" y="226" class="note">多版本切换</text>

  <line x1="380" y1="160" x2="400" y2="160" stroke="#6366f1" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="400" y="80" width="170" height="160" rx="8" fill="url(#g3)" stroke="#fcd34d" stroke-width="1" filter="url(#sh)"/>
  <text x="485" y="108" text-anchor="middle" class="step" fill="#92400e">③ 终端</text>
  <line x1="420" y1="120" x2="550" y2="120" stroke="#fcd34d" stroke-width="0.5"/>
  <text x="415" y="144" class="desc">zsh + Oh My Zsh</text>
  <text x="415" y="166" class="note">主题/插件</text>
  <text x="415" y="186" class="note">自动补全</text>
  <text x="415" y="206" class="note">语法高亮</text>
  <text x="415" y="226" class="note">提升效率</text>

  <line x1="570" y1="160" x2="590" y2="160" stroke="#6366f1" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="590" y="80" width="190" height="160" rx="8" fill="url(#g4)" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
  <text x="685" y="108" text-anchor="middle" class="step" fill="#5b21b6">④ Git</text>
  <line x1="610" y1="120" x2="760" y2="120" stroke="#c4b5fd" stroke-width="0.5"/>
  <text x="605" y="144" class="desc">版本控制</text>
  <text x="605" y="166" class="note">配置 user.name/email</text>
  <text x="605" y="186" class="note">SSH key 免密</text>
  <text x="605" y="206" class="note">连接 GitHub</text>
  <text x="605" y="226" class="note">提交代码</text>

  <rect x="20" y="270" width="760" height="56" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="0.5"/>
  <text x="400" y="294" text-anchor="middle" class="desc" fill="#444">顺序建议：Homebrew 先装（后续靠它）→ Node.js → 终端美化 → Git 配置</text>
  <text x="400" y="314" text-anchor="middle" class="note">Node.js 推荐 nvm 方式，方便多项目切版本；终端配 Oh My Zsh 提升日常效率</text>
</svg>
