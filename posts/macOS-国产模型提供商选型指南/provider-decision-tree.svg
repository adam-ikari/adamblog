<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="qGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="tArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#6366f1"/>
    </marker>
  </defs>

  <style>
    text { fill: #333333; }
    .title { font-size: 26px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 17px; fill: #666; }
    .q { font-size: 17px; font-weight: 700; fill: #3730a3; }
    .branch { font-size: 15px; font-weight: 600; }
    .leaf { font-size: 15px; }
    .rec { font-size: 15px; font-weight: 700; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">国产模型提供商选型决策树</text>
  <text x="400" y="52" text-anchor="middle" class="sub">按顺序问自己三遍——网络环境 → 使用强度 → 最看重什么</text>

  <!-- Q1: 有稳定代理吗 -->
  <rect x="280" y="76" width="240" height="50" rx="8" fill="url(#qGrad)" stroke="#a5b4fc" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="106" text-anchor="middle" class="q">① 有稳定代理吗？</text>

  <line x1="400" y1="126" x2="400" y2="146" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="200" y1="146" x2="600" y2="146" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="200" y1="146" x2="200" y2="166" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tArrow)"/>
  <line x1="600" y1="146" x2="600" y2="166" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tArrow)"/>
  <text x="195" y="160" text-anchor="end" class="branch" fill="#dc2626">否</text>
  <text x="605" y="160" class="branch" fill="#16a34a">是</text>

  <!-- Q1 否 -->
  <rect x="60" y="168" width="280" height="56" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5" filter="url(#shadow)"/>
  <text x="200" y="190" text-anchor="middle" class="branch" fill="#991b1b">国内直连提供商里选</text>
  <text x="200" y="212" text-anchor="middle" class="leaf" fill="#666">讯飞/DeepSeek/硅基/智谱/通义/Kimi</text>

  <!-- Q1 是 -->
  <rect x="460" y="168" width="280" height="56" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="0.5" filter="url(#shadow)"/>
  <text x="600" y="190" text-anchor="middle" class="branch" fill="#166534">也考虑 OpenRouter</text>
  <text x="600" y="212" text-anchor="middle" class="leaf" fill="#666">想用 Claude/GPT 等国际模型时</text>

  <!-- Q2 -->
  <line x1="200" y1="224" x2="200" y2="252" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tArrow)"/>
  <rect x="80" y="254" width="240" height="50" rx="8" fill="url(#qGrad)" stroke="#a5b4fc" stroke-width="1" filter="url(#shadow)"/>
  <text x="200" y="284" text-anchor="middle" class="q">② 使用强度如何？</text>

  <line x1="200" y1="304" x2="200" y2="322" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="110" y1="322" x2="290" y2="322" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="110" y1="322" x2="110" y2="340" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tArrow)"/>
  <line x1="290" y1="322" x2="290" y2="340" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tArrow)"/>

  <rect x="30" y="342" width="160" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5" filter="url(#shadow)"/>
  <text x="110" y="364" text-anchor="middle" class="branch" fill="#1e40af">重度/日常主力</text>
  <text x="110" y="382" text-anchor="middle" class="leaf" fill="#666">优先订阅制</text>

  <rect x="210" y="342" width="160" height="50" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="0.5" filter="url(#shadow)"/>
  <text x="290" y="364" text-anchor="middle" class="branch" fill="#92400e">轻度/尝鲜</text>
  <text x="290" y="382" text-anchor="middle" class="leaf" fill="#666">优先按量计费</text>

  <!-- Q3 -->
  <line x1="200" y1="392" x2="200" y2="416" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tArrow)"/>
  <rect x="80" y="418" width="240" height="50" rx="8" fill="url(#qGrad)" stroke="#a5b4fc" stroke-width="1" filter="url(#shadow)"/>
  <text x="200" y="448" text-anchor="middle" class="q">③ 最看重什么？</text>

  <line x1="200" y1="468" x2="200" y2="486" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="60" y1="486" x2="740" y2="486" stroke="#6366f1" stroke-width="1.5"/>

  <!-- 五个叶子 -->
  <line x1="60" y1="486" x2="60" y2="504" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tArrow)"/>
  <line x1="220" y1="486" x2="220" y2="504" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tArrow)"/>
  <line x1="380" y1="486" x2="380" y2="504" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tArrow)"/>
  <line x1="540" y1="486" x2="540" y2="504" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tArrow)"/>
  <line x1="740" y1="486" x2="740" y2="504" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tArrow)"/>

  <rect x="10" y="506" width="120" height="64" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="0.5" filter="url(#shadow)"/>
  <text x="70" y="528" text-anchor="middle" class="leaf" fill="#666">性价比</text>
  <text x="70" y="552" text-anchor="middle" class="rec" fill="#166534">DeepSeek</text>

  <rect x="150" y="506" width="140" height="64" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="0.5" filter="url(#shadow)"/>
  <text x="220" y="528" text-anchor="middle" class="leaf" fill="#666">免费试多模型</text>
  <text x="220" y="552" text-anchor="middle" class="rec" fill="#166534">硅基流动</text>

  <rect x="310" y="506" width="140" height="64" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="0.5" filter="url(#shadow)"/>
  <text x="380" y="528" text-anchor="middle" class="leaf" fill="#666">一账号多模型</text>
  <text x="380" y="552" text-anchor="middle" class="rec" fill="#166534">讯飞 Coding</text>

  <rect x="470" y="506" width="140" height="64" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="0.5" filter="url(#shadow)"/>
  <text x="540" y="528" text-anchor="middle" class="leaf" fill="#666">中文/合规稳定</text>
  <text x="540" y="552" text-anchor="middle" class="rec" fill="#166534">智谱/通义</text>

  <rect x="630" y="506" width="160" height="64" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="0.5" filter="url(#shadow)"/>
  <text x="710" y="528" text-anchor="middle" class="leaf" fill="#666">超长上下文</text>
  <text x="710" y="552" text-anchor="middle" class="rec" fill="#166534">Kimi</text>

  <text x="400" y="600" text-anchor="middle" class="sub" fill="#888">选完用 cc-Switch 管理多个国产模型，一键切换</text>
</svg>
