<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="htmlG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fee2e2"/><stop offset="100%" stop-color="#fecaca"/></linearGradient>
    <linearGradient id="cssG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#dbeafe"/><stop offset="100%" stop-color="#bfdbfe"/></linearGradient>
    <linearGradient id="jsG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fde68a"/></linearGradient>
    <linearGradient id="brG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#bbf7d0"/></linearGradient>
    <linearGradient id="othG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#ddd6fe"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <style>
    text { fill: #333333; }
    .title { font-size: 26px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 17px; fill: #666; }
    .cat { font-size: 19px; font-weight: 700; }
    .item { font-size: 14px; fill: #555; }
  </style>
  <text x="400" y="30" text-anchor="middle" class="title">前端知识大纲总览</text>
  <text x="400" y="52" text-anchor="middle" class="sub">HTML 结构 · CSS 样式 · JavaScript 逻辑 · 浏览器运行 · 工具链协作</text>

  <!-- HTML -->
  <rect x="20" y="80" width="150" height="300" rx="8" fill="url(#htmlG)" stroke="#fca5a5" stroke-width="1" filter="url(#sh)"/>
  <text x="95" y="108" text-anchor="middle" class="cat" fill="#991b1b">HTML</text>
  <line x1="40" y1="120" x2="150" y2="120" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="35" y="144" class="item">基础标签</text>
  <text x="35" y="166" class="item">表单元素</text>
  <text x="35" y="188" class="item">语义化标签</text>
  <text x="35" y="210" class="item">HTML5 新特性</text>
  <text x="35" y="232" class="item">SEO 友好</text>
  <text x="35" y="254" class="item">无障碍 a11y</text>
  <text x="35" y="288" class="item" fill="#b91c1c">结构层</text>

  <!-- CSS -->
  <rect x="180" y="80" width="150" height="300" rx="8" fill="url(#cssG)" stroke="#93c5fd" stroke-width="1" filter="url(#sh)"/>
  <text x="255" y="108" text-anchor="middle" class="cat" fill="#1e40af">CSS</text>
  <line x1="200" y1="120" x2="310" y2="120" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="195" y="144" class="item">选择器</text>
  <text x="195" y="166" class="item">盒模型</text>
  <text x="195" y="188" class="item">布局(Flex/Grid)</text>
  <text x="195" y="210" class="item">响应式</text>
  <text x="195" y="232" class="item">动画/过渡</text>
  <text x="195" y="254" class="item">预处理器</text>
  <text x="195" y="288" class="item" fill="#1e3a8a">样式层</text>

  <!-- JavaScript -->
  <rect x="340" y="80" width="150" height="300" rx="8" fill="url(#jsG)" stroke="#fcd34d" stroke-width="1" filter="url(#sh)"/>
  <text x="415" y="108" text-anchor="middle" class="cat" fill="#92400e">JavaScript</text>
  <line x1="360" y1="120" x2="470" y2="120" stroke="#fcd34d" stroke-width="0.5"/>
  <text x="355" y="144" class="item">数据类型</text>
  <text x="355" y="166" class="item">作用域/闭包</text>
  <text x="355" y="188" class="item">原型/继承</text>
  <text x="355" y="210" class="item">异步(Promise)</text>
  <text x="355" y="232" class="item">ES6+ 语法</text>
  <text x="355" y="254" class="item">DOM/BOM</text>
  <text x="355" y="288" class="item" fill="#b45309">逻辑层</text>

  <!-- 浏览器 -->
  <rect x="500" y="80" width="150" height="300" rx="8" fill="url(#brG)" stroke="#86efac" stroke-width="1" filter="url(#sh)"/>
  <text x="575" y="108" text-anchor="middle" class="cat" fill="#166534">浏览器</text>
  <line x1="520" y1="120" x2="630" y2="120" stroke="#86efac" stroke-width="0.5"/>
  <text x="515" y="144" class="item">内核/版本</text>
  <text x="515" y="166" class="item">HTTP/缓存</text>
  <text x="515" y="188" class="item">渲染原理</text>
  <text x="515" y="210" class="item">事件循环</text>
  <text x="515" y="232" class="item">性能优化</text>
  <text x="515" y="254" class="item">安全(CSRF/XSS)</text>
  <text x="515" y="288" class="item" fill="#15803d">运行环境</text>

  <!-- 其他/工具 -->
  <rect x="660" y="80" width="120" height="300" rx="8" fill="url(#othG)" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
  <text x="720" y="108" text-anchor="middle" class="cat" fill="#5b21b6">工具</text>
  <line x1="675" y1="120" x2="765" y2="120" stroke="#c4b5fd" stroke-width="0.5"/>
  <text x="675" y="144" class="item">Git 版本</text>
  <text x="675" y="166" class="item">NPM 包</text>
  <text x="675" y="188" class="item">构建工具</text>
  <text x="675" y="210" class="item">框架(Vue等)</text>
  <text x="675" y="232" class="item">调试/DevTools</text>
  <text x="675" y="254" class="item">部署</text>
  <text x="675" y="288" class="item" fill="#6d28d9">协作链</text>

  <!-- 底部 -->
  <rect x="20" y="394" width="760" height="48" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="0.5"/>
  <text x="400" y="416" text-anchor="middle" class="item" fill="#444">结构→样式→逻辑→运行→协作，五层递进，构成前端完整知识图谱</text>
  <text x="400" y="434" text-anchor="middle" class="item" fill="#888">浏览器是前三层的运行环境，工具链贯穿开发到部署全流程</text>
</svg>
