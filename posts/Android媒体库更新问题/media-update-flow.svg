<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <marker id="scanArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#1e40af"/>
    </marker>
    <marker id="missArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#dc2626"/>
    </marker>
    <marker id="okArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#16a34a"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    text { fill: #333333; }
  </style>

  <rect width="800" height="560" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">Android MediaProvider 媒体库更新流程</text>
  <text x="400" y="62" text-anchor="middle" font-size="14" fill="#666">系统自动扫描的三种时机 vs 应用主动触发——拍照不广播，新照片进不了图库</text>

  <!-- ===== 左侧：系统自动触发 ===== -->
  <text x="135" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">系统自动触发（Android 4.4+）</text>

  <!-- 触发条件1 -->
  <rect x="30" y="115" width="210" height="52" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="135" y="138" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">系统启动完成</text>
  <text x="135" y="157" text-anchor="middle" font-size="13" fill="#555">BOOT_COMPLETED</text>

  <!-- 触发条件2 -->
  <rect x="30" y="178" width="210" height="52" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="135" y="201" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">SD 卡插拔</text>
  <text x="135" y="220" text-anchor="middle" font-size="13" fill="#555">外部存储变更</text>

  <!-- 触发条件3 -->
  <rect x="30" y="241" width="210" height="52" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="135" y="264" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">收到扫描广播</text>
  <text x="135" y="283" text-anchor="middle" font-size="13" fill="#555">ACTION_MEDIA_SCANNER_SCAN_FILE</text>

  <!-- 箭头汇向扫描 -->
  <line x1="135" y1="167" x2="135" y2="178" stroke="#1e40af" stroke-width="1.6" marker-end="url(#scanArrow)"/>
  <line x1="135" y1="230" x2="135" y2="241" stroke="#1e40af" stroke-width="1.6" marker-end="url(#scanArrow)"/>
  <line x1="135" y1="293" x2="135" y2="320" stroke="#1e40af" stroke-width="1.6" marker-end="url(#scanArrow)"/>

  <!-- ===== 中间：MediaScanner 扫描 ===== -->
  <rect x="270" y="320" width="260" height="86" rx="10" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="350" text-anchor="middle" font-size="18" font-weight="700" fill="#5b21b6">MediaProvider 扫描</text>
  <text x="400" y="372" text-anchor="middle" font-size="14" fill="#555">遍历文件系统，把新增/删除的</text>
  <text x="400" y="392" text-anchor="middle" font-size="14" fill="#555">媒体信息写入 MediaProvider 数据库</text>

  <!-- 箭头到结果 -->
  <line x1="400" y1="406" x2="400" y2="432" stroke="#1e40af" stroke-width="1.8" marker-end="url(#scanArrow)"/>

  <!-- ===== 底部：结果 ===== -->
  <rect x="270" y="436" width="260" height="62" rx="10" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="461" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">其他应用可读到新文件</text>
  <text x="400" y="482" text-anchor="middle" font-size="13" fill="#555">图库 / 相册 / 第三方应用直接查询 MediaProvider</text>

  <!-- ===== 右侧：应用主动触发 ===== -->
  <text x="665" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">应用主动触发（本例方案）</text>

  <!-- 拍照应用 -->
  <rect x="560" y="115" width="210" height="52" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="665" y="138" text-anchor="middle" font-size="15" font-weight="600" fill="#92400e">拍照应用保存照片</text>
  <text x="665" y="157" text-anchor="middle" font-size="13" fill="#555">文件落盘，但系统未知</text>

  <!-- 漏发广播：错误路径 -->
  <rect x="560" y="178" width="210" height="52" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="665" y="201" text-anchor="middle" font-size="15" font-weight="600" fill="#991b1b">漏发广播 ✗</text>
  <text x="665" y="220" text-anchor="middle" font-size="13" fill="#555">MediaProvider 不更新，图库看不到</text>

  <!-- 主动发广播：正确路径 -->
  <rect x="560" y="241" width="210" height="52" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="665" y="264" text-anchor="middle" font-size="15" font-weight="600" fill="#166534">MediaUtils.updateMedia ✓</text>
  <text x="665" y="283" text-anchor="middle" font-size="13" fill="#555">sendBroadcast 发扫描广播</text>

  <!-- 拍照 -> 漏发（错误） -->
  <line x1="665" y1="167" x2="665" y2="178" stroke="#dc2626" stroke-width="1.6" marker-end="url(#missArrow)"/>

  <!-- 漏发 -> 结果（缺失）虚线 -->
  <path d="M 665 230 L 665 460 L 530 460" fill="none" stroke="#dc2626" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#missArrow)"/>
  <text x="675" y="360" font-size="13" fill="#dc2626" font-weight="600">无更新，图库缺失</text>

  <!-- 正确路径箭头到扫描：绕到左侧入口 -->
  <path d="M 665 293 Q 665 320 530 360" fill="none" stroke="#16a34a" stroke-width="1.8" marker-end="url(#okArrow)"/>
  <text x="600" y="320" font-size="13" fill="#16a34a" font-weight="600">触发扫描</text>

  <!-- 图注 -->
  <text x="400" y="528" text-anchor="middle" font-size="13" fill="#666">结论：应用产生的新媒体文件，必须主动发 ACTION_MEDIA_SCANNER_SCAN_FILE 广播，系统才会收录</text>
</svg>
