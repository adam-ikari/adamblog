<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="preGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="instGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="distribGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="cfgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="doneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#1e40af"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#b45309"/>
    </marker>
  </defs>

  <style>
    text { fill: #333333; }
    .title { font-size: 26px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 15px; fill: #666666; }
    .stage { font-size: 16px; font-weight: 700; }
    .card-title { font-size: 16px; font-weight: 700; }
    .card-sub { font-size: 13px; fill: #555555; }
    .note { font-size: 13px; }
    .pill { font-size: 13px; font-weight: 600; }
  </style>

  <rect x="0" y="0" width="800" height="720" fill="url(#bgGrad)"/>

  <text x="400" y="36" text-anchor="middle" class="title">Windows 11 配置 WSL2 全流程</text>
  <text x="400" y="58" text-anchor="middle" class="subtitle">前提 → 安装 → 发行版 → 配置，五段式搭建 Linux 开发环境</text>

  <!-- 阶段轴标签 -->
  <text x="400" y="86" text-anchor="middle" class="subtitle" fill="#94a3b8">┌─ 一键命令直达 ─┐    └─ 手动四步兜底 ─┘</text>

  <!-- ===== 阶段1：前提条件 ===== -->
  <rect x="270" y="100" width="260" height="64" rx="10" fill="url(#preGrad)" stroke="#fcd34d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="124" text-anchor="middle" class="stage" fill="#b45309">① 前提条件</text>
  <text x="400" y="146" text-anchor="middle" class="card-sub">Win11 21H2+ · CPU 虚拟化（BIOS 启用）</text>
  <line x1="400" y1="164" x2="400" y2="184" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 阶段2：安装 WSL2 — 两条路径 ===== -->
  <rect x="60" y="186" width="320" height="138" rx="10" fill="url(#instGrad)" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="186" width="320" height="30" rx="10" fill="#bfdbfe"/>
  <rect x="60" y="206" width="320" height="10" fill="#bfdbfe"/>
  <text x="220" y="207" text-anchor="middle" class="stage" fill="#1e40af">② 方法一：一键安装（推荐）</text>
  <rect x="80" y="228" width="280" height="30" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="220" y="248" text-anchor="middle" class="card-title" fill="#1e40af" font-family="ui-monospace, 'Cascadia Code', monospace">wsl --install</text>
  <text x="220" y="278" text-anchor="middle" class="card-sub">自动启用 WSL+虚拟机平台、装内核、</text>
  <text x="220" y="296" text-anchor="middle" class="card-sub">装 Ubuntu、设 WSL2 为默认 → 重启</text>

  <rect x="420" y="186" width="320" height="138" rx="10" fill="url(#instGrad)" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="420" y="186" width="320" height="30" rx="10" fill="#bfdbfe"/>
  <rect x="420" y="206" width="320" height="10" fill="#bfdbfe"/>
  <text x="580" y="207" text-anchor="middle" class="stage" fill="#1e40af">② 方法二：手动启用功能</text>
  <text x="436" y="234" class="card-sub">1. 启用 WSL 功能（dism）</text>
  <text x="436" y="254" class="card-sub">2. 启用虚拟机平台（dism）</text>
  <text x="436" y="274" class="card-sub">3. 下载安装 Linux 内核更新包</text>
  <text x="436" y="294" class="card-sub">4. wsl --set-default-version 2 → 重启</text>
  <text x="436" y="316" class="note" fill="#64748b">一键失败时的兜底方案</text>

  <!-- 两条路径汇合 -->
  <path d="M 220 324 L 220 348 L 400 348" fill="none" stroke="#1e40af" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <path d="M 580 324 L 580 348 L 400 348" fill="none" stroke="#b45309" stroke-width="1.5"/>

  <!-- ===== 阶段3：安装发行版 ===== -->
  <line x1="400" y1="348" x2="400" y2="368" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="240" y="370" width="320" height="84" rx="10" fill="url(#distribGrad)" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="370" width="320" height="30" rx="10" fill="#ddd6fe"/>
  <rect x="240" y="390" width="320" height="10" fill="#ddd6fe"/>
  <text x="400" y="391" text-anchor="middle" class="stage" fill="#6d28d9">③ 安装 Linux 发行版</text>
  <text x="400" y="420" text-anchor="middle" class="card-sub">Microsoft Store 或 wsl --install -d</text>
  <text x="400" y="440" text-anchor="middle" class="card-sub">Ubuntu / Debian · 首次启动建用户名密码</text>
  <line x1="400" y1="454" x2="400" y2="474" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 阶段4：基础配置（四模块） ===== -->
  <rect x="60" y="476" width="680" height="158" rx="10" fill="url(#cfgGrad)" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="476" width="680" height="30" rx="10" fill="#bbf7d0"/>
  <rect x="60" y="496" width="680" height="10" fill="#bbf7d0"/>
  <text x="400" y="497" text-anchor="middle" class="stage" fill="#15803d">④ 基础配置（.wslconfig 与发行版内）</text>

  <!-- 配置四子模块 -->
  <rect x="80" y="518" width="150" height="100" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1" filter="url(#shadow)"/>
  <text x="155" y="540" text-anchor="middle" class="card-title" fill="#15803d">默认用户</text>
  <text x="155" y="562" text-anchor="middle" class="card-sub">ubuntu config</text>
  <text x="155" y="580" text-anchor="middle" class="card-sub">--default-user root</text>
  <text x="155" y="604" text-anchor="middle" class="note" fill="#64748b">或 sudo -i</text>

  <rect x="245" y="518" width="150" height="100" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1" filter="url(#shadow)"/>
  <text x="320" y="540" text-anchor="middle" class="card-title" fill="#15803d">镜像源</text>
  <text x="320" y="562" text-anchor="middle" class="card-sub">清华源 / 阿里源</text>
  <text x="320" y="580" text-anchor="middle" class="card-sub">替换 sources.list</text>
  <text x="320" y="604" text-anchor="middle" class="note" fill="#64748b">apt update 升级</text>

  <rect x="410" y="518" width="150" height="100" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1" filter="url(#shadow)"/>
  <text x="485" y="540" text-anchor="middle" class="card-title" fill="#15803d">资源限制</text>
  <text x="485" y="562" text-anchor="middle" class="card-sub">memory=4GB</text>
  <text x="485" y="580" text-anchor="middle" class="card-sub">processors · swap</text>
  <text x="485" y="604" text-anchor="middle" class="note" fill="#64748b">autoMemoryReclaim</text>

  <rect x="575" y="518" width="150" height="100" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1" filter="url(#shadow)"/>
  <text x="650" y="540" text-anchor="middle" class="card-title" fill="#15803d">镜像网络</text>
  <text x="650" y="562" text-anchor="middle" class="card-sub">networkingMode</text>
  <text x="650" y="580" text-anchor="middle" class="card-sub">=mirrored</text>
  <text x="650" y="604" text-anchor="middle" class="note" fill="#64748b">VPN/DNS 省心</text>

  <line x1="400" y1="634" x2="400" y2="654" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 阶段5：可用环境 ===== -->
  <rect x="200" y="656" width="400" height="50" rx="25" fill="url(#doneGrad)" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="687" text-anchor="middle" class="pill" fill="#14532d">⑤ 可投入使用的 Linux 开发环境</text>
</svg>
