<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" text-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="g-pre" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="g-install" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="g-config" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="g-use" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="g-adv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe4e6"/>
      <stop offset="100%" stop-color="#fecdd3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif; }
    .title { font-size: 27px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-size: 14px; fill: #64748b; }
    .step-title { font-size: 17px; font-weight: 700; fill: #1e293b; }
    .step-num { font-size: 13px; font-weight: 700; fill: #ffffff; }
    .body { font-size: 14px; fill: #334155; }
    .small { font-size: 13px; fill: #475569; }
    .key { font-size: 14px; font-weight: 600; fill: #1e40af; }
    .warn { font-size: 13px; font-weight: 600; fill: #b45309; }
    .badge { font-size: 12px; font-weight: 600; fill: #ffffff; }
    .arrowlbl { font-size: 12px; fill: #64748b; font-style: italic; }
  </style>

  <rect width="800" height="640" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" class="title">WSL2 安装使用 Claude Code 全流程</text>
  <text x="400" y="60" text-anchor="middle" class="subtitle">从环境准备到进阶配置 · 国产 API 替代官方认证</text>

  <!-- Step 1: 前提条件 -->
  <g filter="url(#shadow)">
    <rect x="30" y="90" width="220" height="150" rx="10" fill="url(#g-pre)" stroke="#1e40af" stroke-width="1.2"/>
  </g>
  <circle cx="55" cy="115" r="14" fill="#1e40af"/>
  <text x="55" y="120" text-anchor="middle" class="step-num">1</text>
  <text x="80" y="121" class="step-title">前提条件</text>
  <text x="46" y="148" class="body">· WSL2 已安装并运行</text>
  <text x="46" y="170" class="body">· Node.js 18+（nvm 管理）</text>
  <text x="46" y="192" class="body">· 选一家国产大模型 API</text>
  <text x="46" y="214" class="small">讯飞 / DeepSeek / OpenRouter</text>

  <!-- Step 2: 安装 -->
  <g filter="url(#shadow)">
    <rect x="290" y="90" width="220" height="150" rx="10" fill="url(#g-install)" stroke="#16a34a" stroke-width="1.2"/>
  </g>
  <circle cx="315" cy="115" r="14" fill="#16a34a"/>
  <text x="315" y="120" text-anchor="middle" class="step-num">2</text>
  <text x="340" y="121" class="step-title">安装 Claude Code</text>
  <text x="306" y="148" class="body">npm i -g @anthropic-ai/claude-code</text>
  <text x="306" y="172" class="small">权限报错 → 改 npm 全局路径</text>
  <text x="306" y="192" class="small">或 sudo 安装</text>
  <text x="306" y="214" class="small">验证：claude --version</text>

  <!-- Step 3: 首次配置 -->
  <g filter="url(#shadow)">
    <rect x="550" y="90" width="220" height="150" rx="10" fill="url(#g-config)" stroke="#b45309" stroke-width="1.2"/>
  </g>
  <circle cx="575" cy="115" r="14" fill="#b45309"/>
  <text x="575" y="120" text-anchor="middle" class="step-num">3</text>
  <text x="600" y="121" class="step-title">首次配置认证</text>
  <text x="566" y="148" class="body">设置环境变量到 ~/.bashrc</text>
  <text x="566" y="170" class="warn">ANTHROPIC_BASE_URL = 国产 API</text>
  <text x="566" y="190" class="warn">ANTHROPIC_API_KEY = 你的 Key</text>
  <text x="566" y="214" class="small">名带 ANTHROPIC 实指国产</text>

  <!-- Arrows row 1 -->
  <line x1="250" y1="165" x2="288" y2="165" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="510" y1="165" x2="548" y2="165" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="269" y="158" text-anchor="middle" class="arrowlbl">环境就绪</text>
  <text x="529" y="158" text-anchor="middle" class="arrowlbl">装完</text>

  <!-- Down arrow from step3 to step4 -->
  <path d="M660,240 L660,300 L140,300 L140,338" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)" stroke-dasharray="5,4"/>
  <text x="400" y="294" text-anchor="middle" class="arrowlbl">认证通过 → 启动</text>

  <!-- Step 4: 基本使用 -->
  <g filter="url(#shadow)">
    <rect x="30" y="340" width="220" height="170" rx="10" fill="url(#g-use)" stroke="#1e40af" stroke-width="1.2"/>
  </g>
  <circle cx="55" cy="365" r="14" fill="#1e40af"/>
  <text x="55" y="370" text-anchor="middle" class="step-num">4</text>
  <text x="80" y="371" class="step-title">基本使用</text>
  <text x="46" y="398" class="body">cd 项目目录 → claude 启动</text>
  <text x="46" y="420" class="body">交互对话写代码 / 改 bug</text>
  <text x="46" y="442" class="body">斜杠命令：/clear /compact</text>
  <text x="46" y="464" class="body">　/model /fast /config</text>
  <text x="46" y="488" class="small">文件操作、Shell 均需确认</text>

  <!-- Step 5: 项目配置 -->
  <g filter="url(#shadow)">
    <rect x="290" y="340" width="220" height="170" rx="10" fill="url(#g-use)" stroke="#1e40af" stroke-width="1.2"/>
  </g>
  <circle cx="315" cy="365" r="14" fill="#1e40af"/>
  <text x="315" y="370" text-anchor="middle" class="step-num">5</text>
  <text x="340" y="371" class="step-title">项目配置</text>
  <text x="306" y="398" class="body">CLAUDE.md 项目上下文说明</text>
  <text x="306" y="420" class="body">.claude/settings.json</text>
  <text x="306" y="442" class="small">　permissions allow/deny</text>
  <text x="306" y="464" class="body">权限：deny 优先于 allow</text>
  <text x="306" y="488" class="small">最小权限，别全放开</text>

  <!-- Step 6: 进阶 -->
  <g filter="url(#shadow)">
    <rect x="550" y="340" width="220" height="170" rx="10" fill="url(#g-adv)" stroke="#dc2626" stroke-width="1.2"/>
  </g>
  <circle cx="575" cy="365" r="14" fill="#dc2626"/>
  <text x="575" y="370" text-anchor="middle" class="step-num">6</text>
  <text x="600" y="371" class="step-title">进阶使用</text>
  <text x="566" y="398" class="body">MCP Server 接外部工具</text>
  <text x="566" y="418" class="small">　文件/GitHub/Postgres/搜索</text>
  <text x="566" y="440" class="body">Hooks 事件触发自定义脚本</text>
  <text x="566" y="462" class="body">/model 切 Opus/Sonnet</text>
  <text x="566" y="486" class="small">/fast 简单任务用快模型</text>

  <!-- Arrows row 2 -->
  <line x1="250" y1="425" x2="288" y2="425" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="510" y1="425" x2="548" y2="425" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="269" y="418" text-anchor="middle" class="arrowlbl">跑通</text>
  <text x="529" y="418" text-anchor="middle" class="arrowlbl">规范</text>

  <!-- Bottom tip bar: cc-Switch -->
  <g filter="url(#shadow)">
    <rect x="30" y="540" width="740" height="76" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.4"/>
  </g>
  <rect x="30" y="540" width="8" height="76" rx="4" fill="#16a34a"/>
  <text x="54" y="566" class="step-title" fill="#15803d">多提供商/多账户切换 → cc-Switch</text>
  <text x="54" y="590" class="body">一条命令切 Profile，自动改写 settings.json</text>
  <text x="54" y="608" class="small">工作/个人账户 · 额度耗尽换备用 · 不同项目配不同模型</text>
  <rect x="660" y="558" width="92" height="24" rx="12" fill="#16a34a"/>
  <text x="706" y="575" text-anchor="middle" class="badge">推荐工具</text>
</svg>
