<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="r1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="r2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="r3Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <style>
    text { fill: #333333; }
    .title { font-size: 26px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 17px; fill: #666; }
    .reason-num { font-size: 20px; font-weight: 700; }
    .reason-title { font-size: 19px; font-weight: 700; }
    .note { font-size: 15px; fill: #555; }
    .conclude { font-size: 16px; font-weight: 600; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">为何打印机是信创外设的重点</text>
  <text x="400" y="52" text-anchor="middle" class="sub">不是最大外设品类，却是安全属性最强、合规约束最硬、国产化溢价最明显的一个</text>

  <!-- 原因一 -->
  <rect x="30" y="80" width="240" height="240" rx="8" fill="url(#r1Grad)" stroke="#93c5fd" stroke-width="1" filter="url(#shadow)"/>
  <text x="150" y="110" text-anchor="middle" class="reason-num" fill="#1e40af">① 政企打印量大</text>
  <line x1="60" y1="124" x2="240" y2="124" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="50" y="150" class="note">• 公文/文书/票据/处方/回单</text>
  <text x="50" y="174" class="note">• 纸面输出至今未全电子化</text>
  <text x="50" y="198" class="note">• 打印是刚需非可选项</text>
  <text x="50" y="222" class="note">• PC可不接扫描仪/光驱</text>
  <text x="50" y="246" class="note">• 但几乎不可能不接打印机</text>
  <text x="50" y="284" class="conclude" fill="#1e3a8a">采购量跟终端走</text>
  <text x="50" y="306" class="conclude" fill="#1e3a8a">耗材持续支出</text>

  <!-- 原因二 -->
  <rect x="285" y="80" width="240" height="240" rx="8" fill="url(#r2Grad)" stroke="#fcd34d" stroke-width="1" filter="url(#shadow)"/>
  <text x="405" y="110" text-anchor="middle" class="reason-num" fill="#92400e">② 文档安全关口</text>
  <line x1="315" y1="124" x2="495" y2="124" stroke="#fcd34d" stroke-width="0.5"/>
  <text x="305" y="150" class="note">• 信息离开数字系统</text>
  <text x="305" y="174" class="note">• 进入物理世界的关口</text>
  <text x="305" y="198" class="note">• 泄密高发：忘取/打错机</text>
  <text x="305" y="222" class="note">• 敏感件落非涉密机</text>
  <text x="305" y="246" class="note">• 安全审计高危项</text>
  <text x="305" y="284" class="conclude" fill="#92400e">国产化=攥住泄密关口</text>
  <text x="305" y="306" class="conclude" fill="#92400e">重视"输出关口安全"</text>

  <!-- 原因三 -->
  <rect x="540" y="80" width="240" height="240" rx="8" fill="url(#r3Grad)" stroke="#fca5a5" stroke-width="1" filter="url(#shadow)"/>
  <text x="660" y="110" text-anchor="middle" class="reason-num" fill="#991b1b">③ 国密与等保硬约束</text>
  <line x1="570" y1="124" x2="750" y2="124" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="560" y="150" class="note">• 涉密文档输出走国密</text>
  <text x="560" y="174" class="note">• 等保审打印日志</text>
  <text x="560" y="198" class="note">• 审身份认证</text>
  <text x="560" y="222" class="note">• 倒逼打印机具密码能力</text>
  <text x="560" y="246" class="note">• 倒逼打印机具审计能力</text>
  <text x="560" y="284" class="conclude" fill="#991b1b">合规划成两个市场</text>
  <text x="560" y="306" class="conclude" fill="#991b1b">"信创安全打印机"为重点</text>

  <!-- 底部 -->
  <rect x="30" y="340" width="750" height="60" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="0.5"/>
  <text x="400" y="366" text-anchor="middle" class="conclude" fill="#444">三条叠加 → 打印机成信创外设里被单独重点国产化的一环</text>
  <text x="400" y="388" text-anchor="middle" class="note">奔图把安全打印做成独立业务线 · 航天信息守税控打印壁垒稳当</text>

  <text x="400" y="425" text-anchor="middle" class="note" fill="#888">安全属性最强 · 合规约束最硬 · 国产化溢价最明显——这就是打印机在信创外设里的特殊位置</text>
</svg>
