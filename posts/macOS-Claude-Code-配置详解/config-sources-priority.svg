<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="priGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <style>
    text { fill: #333333; }
    .title { font-size: 26px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 17px; fill: #666; }
    .src { font-size: 18px; font-weight: 700; }
    .loc { font-size: 15px; fill: #555; }
    .scope { font-size: 15px; }
    .use { font-size: 14px; fill: #666; }
    .axis { font-size: 15px; font-weight: 600; fill: #888; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">Claude Code 配置来源与优先级</text>
  <text x="400" y="52" text-anchor="middle" class="sub">多来源按优先级合并——CLI 参数 > 环境变量 > 项目级 settings > 用户级 settings</text>

  <text x="40" y="92" class="axis">低（广覆盖）</text>
  <text x="760" y="92" text-anchor="end" class="axis">高（窄覆盖·临时）</text>

  <!-- 用户级 settings（最低优先级，最宽） -->
  <rect x="40" y="100" width="720" height="60" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="128" class="src" fill="#475569">用户级 settings.json</text>
  <text x="60" y="148" class="loc">~/.claude/settings.json</text>
  <text x="430" y="128" class="scope" fill="#475569">作用范围：该用户所有项目</text>
  <text x="430" y="148" class="use">接入第三方 API、全局偏好（推荐放 env 块）</text>

  <!-- 项目级 settings -->
  <rect x="40" y="170" width="540" height="60" rx="6" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="198" class="src" fill="#3730a3">项目级 settings.json</text>
  <text x="60" y="218" class="loc">&lt;项目&gt;/.claude/settings.json</text>
  <text x="370" y="198" class="scope" fill="#3730a3">单个项目</text>
  <text x="370" y="218" class="use">项目专属权限、MCP</text>

  <!-- 环境变量 -->
  <rect x="40" y="240" width="360" height="60" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="268" class="src" fill="#92400e">环境变量</text>
  <text x="60" y="288" class="loc">Shell（~/.zshrc）</text>
  <text x="240" y="268" class="scope" fill="#92400e">当前终端会话</text>
  <text x="240" y="288" class="use">临时切换、快速测试</text>

  <!-- CLI 参数（最高，最窄） -->
  <rect x="40" y="310" width="200" height="60" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="338" class="src" fill="#166534">CLI 参数</text>
  <text x="60" y="358" class="loc">claude --model xxx</text>
  <text x="140" y="338" class="scope" fill="#166534">单次启动</text>
  <text x="140" y="358" class="use">临时覆盖</text>

  <!-- 优先级箭头 -->
  <line x1="40" y1="100" x2="40" y2="370" stroke="#16a34a" stroke-width="2" marker-end="url(#upArrow)" opacity="0"/>
  <text x="20" y="240" text-anchor="middle" class="axis" fill="#16a34a" transform="rotate(-90 20 240)">优先级升高 ▶</text>

  <!-- 底部提示 -->
  <rect x="40" y="386" width="720" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="60" y="412" class="use" fill="#991b1b">💡 接入国产模型：base_url / auth_token 放用户级 settings.json 的 env 块，不污染 Shell，方便 cc-Switch 整体切换</text>
</svg>
