<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="vuexG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#bbf7d0"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="va" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#16a34a"/></marker>
  </defs>
  <style>
    text { fill: #333333; }
    .title { font-size: 26px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 17px; fill: #666; }
    .box { font-size: 18px; font-weight: 700; }
    .desc { font-size: 14px; fill: #555; }
    .note { font-size: 13px; fill: #666; }
  </style>
  <text x="400" y="30" text-anchor="middle" class="title">Vuex 状态流转</text>
  <text x="400" y="52" text-anchor="middle" class="sub">单向数据流：组件 dispatch Action → commit Mutation → 改 State → 视图更新</text>

  <!-- Vue 组件 -->
  <rect x="40" y="90" width="160" height="90" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1" filter="url(#sh)"/>
  <text x="120" y="118" text-anchor="middle" class="box" fill="#1e40af">Vue 组件</text>
  <text x="120" y="140" text-anchor="middle" class="desc">视图</text>
  <text x="120" y="160" text-anchor="middle" class="note">dispatch / render</text>

  <line x1="200" y1="120" x2="240" y2="120" stroke="#16a34a" stroke-width="1.5" marker-end="url(#va)"/>
  <text x="220" y="112" text-anchor="middle" class="note" fill="#16a34a">dispatch</text>

  <!-- Action -->
  <rect x="240" y="90" width="160" height="90" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1" filter="url(#sh)"/>
  <text x="320" y="118" text-anchor="middle" class="box" fill="#92400e">Action</text>
  <text x="320" y="140" text-anchor="middle" class="desc">异步操作</text>
  <text x="320" y="160" text-anchor="middle" class="note">可含异步逻辑</text>

  <line x1="400" y1="120" x2="440" y2="120" stroke="#16a34a" stroke-width="1.5" marker-end="url(#va)"/>
  <text x="420" y="112" text-anchor="middle" class="note" fill="#16a34a">commit</text>

  <!-- Mutation -->
  <rect x="440" y="90" width="160" height="90" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1" filter="url(#sh)"/>
  <text x="520" y="118" text-anchor="middle" class="box" fill="#991b1b">Mutation</text>
  <text x="520" y="140" text-anchor="middle" class="desc">同步改状态</text>
  <text x="520" y="160" text-anchor="middle" class="note">按序执行</text>

  <line x1="600" y1="120" x2="640" y2="120" stroke="#16a34a" stroke-width="1.5" marker-end="url(#va)"/>
  <text x="620" y="112" text-anchor="middle" class="note" fill="#16a34a">mutate</text>

  <!-- State -->
  <rect x="640" y="90" width="140" height="90" rx="8" fill="url(#vuexG)" stroke="#86efac" stroke-width="1" filter="url(#sh)"/>
  <text x="710" y="118" text-anchor="middle" class="box" fill="#166534">State</text>
  <text x="710" y="140" text-anchor="middle" class="desc">单一状态树</text>
  <text x="710" y="160" text-anchor="middle" class="note">响应式</text>

  <!-- 回流箭头：State → 组件 -->
  <path d="M 710 180 Q 710 230 400 230 Q 120 230 120 180" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#va)" stroke-dasharray="5,3"/>
  <text x="400" y="222" text-anchor="middle" class="note" fill="#16a34a">render（状态变 → 视图自动更新）</text>

  <!-- Getter 旁支 -->
  <rect x="440" y="270" width="160" height="70" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
  <text x="520" y="298" text-anchor="middle" class="box" fill="#5b21b6">Getter</text>
  <text x="520" y="320" text-anchor="middle" class="desc">派生状态（计算属性）</text>
  <line x1="600" y1="305" x2="640" y2="135" stroke="#6d28d9" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="640" y="305" class="note" fill="#6d28d9">读 State 派生</text>

  <!-- Module -->
  <rect x="40" y="270" width="380" height="70" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" filter="url(#sh)"/>
  <text x="60" y="298" class="box" fill="#475569">Module</text>
  <text x="60" y="320" class="desc">大型应用按子模块拆分 store，各自管理状态</text>
  <text x="60" y="336" class="note">每个 Module 可有自己的 State/Getter/Mutation/Action</text>

  <!-- 底部 -->
  <rect x="40" y="370" width="720" height="50" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="0.5"/>
  <text x="400" y="392" text-anchor="middle" class="desc" fill="#444">核心约束：改 State 必须经 Mutation（同步），异步逻辑放 Action</text>
  <text x="400" y="410" text-anchor="middle" class="note">状态可追踪、可调试（DevTools 时间旅行），这是 Vuex 的价值</text>
</svg>
