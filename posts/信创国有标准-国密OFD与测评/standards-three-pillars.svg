<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="cryptoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="ofdGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="evalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <style>
    text { fill: #333333; }
    .title { font-size: 26px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 17px; fill: #666; }
    .name { font-size: 20px; font-weight: 700; }
    .domain { font-size: 16px; font-weight: 600; }
    .note { font-size: 14px; fill: #666; }
    .cost { font-size: 14px; fill: #dc2626; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">信创标准三块：自主可控在标准层的落地</text>
  <text x="400" y="52" text-anchor="middle" class="sub">把规则的制定权和裁定权收回来——宁可与国际主流分叉，也要把主导权握住</text>

  <!-- 国密 -->
  <rect x="30" y="80" width="240" height="240" rx="8" fill="url(#cryptoGrad)" stroke="#93c5fd" stroke-width="1" filter="url(#shadow)"/>
  <text x="150" y="110" text-anchor="middle" class="name" fill="#1e40af">国密算法</text>
  <text x="150" y="132" text-anchor="middle" class="domain" fill="#1e3a8a">管算法（加密这环自己定）</text>
  <line x1="60" y1="144" x2="240" y2="144" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="50" y="168" class="note">• SM2/SM3/SM4 等自有算法</text>
  <text x="50" y="190" class="note">• 替代 RSA/AES 体系</text>
  <text x="50" y="212" class="note">• CPU 硬件支持国密指令</text>
  <text x="50" y="234" class="note">• 国密 CA 签发证书</text>
  <text x="50" y="270" class="cost">代价：与 RSA/AES 不互通</text>
  <text x="50" y="290" class="cost">跨国协作加密摩擦</text>
  <text x="50" y="310" class="cost">国密浏览器普及有限</text>

  <!-- OFD -->
  <rect x="285" y="80" width="240" height="240" rx="8" fill="url(#ofdGrad)" stroke="#86efac" stroke-width="1" filter="url(#shadow)"/>
  <text x="405" y="110" text-anchor="middle" class="name" fill="#166534">OFD 版式</text>
  <text x="405" y="132" text-anchor="middle" class="domain" fill="#15803d">管格式（文档这环自己定）</text>
  <line x1="315" y1="144" x2="495" y2="144" stroke="#86efac" stroke-width="0.5"/>
  <text x="305" y="168" class="note">• 国产版式标准</text>
  <text x="305" y="190" class="note">• 替代 PDF</text>
  <text x="305" y="212" class="note">• 政务公文场景落地</text>
  <text x="305" y="234" class="note">• 版式自主可控</text>
  <text x="305" y="270" class="cost">代价：与 PDF 生态不兼容</text>
  <text x="305" y="290" class="cost">海外对方打不开 OFD</text>
  <text x="305" y="310" class="cost">民间认知低、习惯未改</text>

  <!-- 测评认证 -->
  <rect x="540" y="80" width="240" height="240" rx="8" fill="url(#evalGrad)" stroke="#fcd34d" stroke-width="1" filter="url(#shadow)"/>
  <text x="660" y="110" text-anchor="middle" class="name" fill="#92400e">测评认证</text>
  <text x="660" y="132" text-anchor="middle" class="domain" fill="#b45309">管准入（谁能进采购自己定）</text>
  <line x1="570" y1="144" x2="750" y2="144" stroke="#fcd34d" stroke-width="0.5"/>
  <text x="560" y="168" class="note">• 安全可靠测评</text>
  <text x="560" y="190" class="note">• 等保测评配套</text>
  <text x="560" y="212" class="note">• 进采购名录的门槛</text>
  <text x="560" y="234" class="note">• "自主"可被验证</text>
  <text x="560" y="270" class="cost">代价：合规成本高</text>
  <text x="560" y="290" class="cost">厂商送测拿证负担</text>
  <text x="560" y="310" class="cost">名录更新滞后于技术</text>

  <!-- 底部统一逻辑 -->
  <rect x="30" y="340" width="750" height="56" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="0.5"/>
  <text x="400" y="366" text-anchor="middle" class="domain" fill="#444">底层逻辑一致：把规则的制定权与裁定权收回来，攥在自己手里</text>
  <text x="400" y="388" text-anchor="middle" class="note">国密定加密用什么 · OFD 定文档用什么 · 测评定谁能进采购——三者把"自主可控"做成可验证门槛</text>

  <text x="400" y="430" text-anchor="middle" class="note" fill="#888">可控优先：宁可分叉、宁可暂时不便，也要握住主导权——和麒麟自研 UKUI 同一套思路</text>
</svg>
