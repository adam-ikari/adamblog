<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="clsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="objGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <marker id="instArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#1e40af"/>
    </marker>
    <marker id="hasArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#b45309"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    text { fill: #333333; }
    .title { font-size: 27px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 16px; fill: #666; }
    .card-title { font-size: 20px; font-weight: 700; }
    .card-body { font-size: 15px; fill: #444; }
    .card-accent { font-size: 14px; }
    .label { font-size: 15px; font-weight: 600; }
    .footnote { font-size: 13px; fill: #777; }
  </style>

  <rect width="800" height="560" fill="url(#bgGrad)"/>

  <text x="400" y="40" text-anchor="middle" class="title">类 与 对象：模板 与 实例 的关系</text>
  <text x="400" y="64" text-anchor="middle" class="sub">类是描述对象长什么样、能做什么的模板；对象是类的一个实例，带状态、有行为</text>

  <!-- ===== 左侧：类（模板） ===== -->
  <rect x="40" y="96" width="300" height="200" rx="12" fill="url(#clsGrad)" stroke="#818cf8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="190" y="126" text-anchor="middle" class="card-title" fill="#1e40af">蓝图 / 模板：类</text>
  <line x1="60" y1="140" x2="320" y2="140" stroke="#818cf8" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="60" y="166" class="card-accent" font-weight="700" fill="#1e40af">成员变量（状态）</text>
  <text x="60" y="186" class="card-body" fill="#555">· color    颜色</text>
  <text x="60" y="206" class="card-body" fill="#555">· name     名字</text>
  <text x="60" y="226" class="card-body" fill="#555">· breed    品种</text>

  <line x1="60" y1="242" x2="320" y2="242" stroke="#c7d2fe" stroke-width="1"/>

  <text x="60" y="266" class="card-accent" font-weight="700" fill="#1e40af">方法（行为）</text>
  <text x="60" y="286" class="card-body" fill="#555">· wagTail()   摇尾巴</text>

  <!-- 实例化箭头：类 -> 对象 -->
  <line x1="340" y1="196" x2="450" y2="196" stroke="#1e40af" stroke-width="2.2" marker-end="url(#instArrow)"/>
  <text x="395" y="184" text-anchor="middle" class="label" fill="#1e40af">实例化</text>
  <text x="395" y="218" text-anchor="middle" class="footnote">new / 构造</text>

  <!-- ===== 右侧：对象（实例） ===== -->
  <rect x="455" y="96" width="300" height="200" rx="12" fill="url(#objGrad)" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="605" y="126" text-anchor="middle" class="card-title" fill="#166534">实例：对象（具体的一只狗）</text>
  <line x1="475" y1="140" x2="735" y2="140" stroke="#86efac" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="475" y="166" class="card-accent" font-weight="700" fill="#166534">状态（成员变量取值）</text>
  <text x="475" y="186" class="card-body" fill="#555">· color = "棕色"</text>
  <text x="475" y="206" class="card-body" fill="#555">· name  = "旺财"</text>
  <text x="475" y="226" class="card-body" fill="#555">· breed = "中华田园犬"</text>

  <line x1="475" y1="242" x2="735" y2="242" stroke="#bbf7d0" stroke-width="1"/>

  <text x="475" y="266" class="card-accent" font-weight="700" fill="#166534">行为（调用方法）</text>
  <text x="475" y="286" class="card-body" fill="#555">· wagTail() → 真的摇起尾巴</text>

  <!-- ===== 底部：C++ 三大语法支柱，支撑上面这套结构落地 ===== -->
  <text x="400" y="332" text-anchor="middle" class="sub" fill="#555">类与对象的写法，靠下面三块 C++ 基本语法落地</text>

  <!-- 支柱 1：分号 -->
  <rect x="40" y="352" width="235" height="92" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="157" y="380" text-anchor="middle" class="card-title" fill="#b45309">语句结束符 ;</text>
  <text x="157" y="404" text-anchor="middle" class="card-body" fill="#555">每条语句末尾必须加分号</text>
  <text x="157" y="424" text-anchor="middle" class="footnote" fill="#777">编译器靠它切分语句</text>

  <!-- 支柱 2：代码块 -->
  <rect x="283" y="352" width="235" height="92" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="400" y="380" text-anchor="middle" class="card-title" fill="#6d28d9">代码块 { }</text>
  <text x="400" y="404" text-anchor="middle" class="card-body" fill="#555">花括号把多条语句打包成整体</text>
  <text x="400" y="424" text-anchor="middle" class="footnote" fill="#777">函数体 / 分支 / 循环都用它</text>

  <!-- 支柱 3：标识符 -->
  <rect x="526" y="352" width="235" height="92" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="643" y="380" text-anchor="middle" class="card-title" fill="#1e40af">标识符</text>
  <text x="643" y="404" text-anchor="middle" class="card-body" fill="#555">给类、变量、方法起的名字</text>
  <text x="643" y="424" text-anchor="middle" class="footnote" fill="#777">字母/数字/下划线，非数字开头</text>

  <!-- 底部总结 -->
  <rect x="40" y="466" width="721" height="74" rx="10" fill="#f8fafc" stroke="#d1d5db" stroke-width="0.6"/>
  <text x="400" y="494" text-anchor="middle" font-size="17" font-weight="700" fill="#dc2626">分号 + 代码块 + 标识符 = C++ 把一段逻辑切分清楚的最小约定</text>
  <text x="400" y="520" text-anchor="middle" class="footnote" fill="#666">靠着这三样，类、对象、方法才能写得清清楚楚，进而搭出复杂程序</text>
</svg>
