<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="commitGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="stageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="branchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="mergeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="miscGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="reflogGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="recArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#1e40af"/>
    </marker>
  </defs>

  <style>
    text { fill: #333333; }
    .cat-title { font-size: 17px; font-weight: 700; }
    .cat-sub { font-size: 13px; }
    .item { font-size: 13px; fill: #444; }
  </style>

  <rect width="800" height="620" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="400" y="34" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">45 个 Git 经典操作场景：五大类全景图</text>
  <text x="400" y="58" text-anchor="middle" font-size="15" fill="#666">从提交到撤销，命令行合代码的日常全场景——底层都有 reflog 兜底</text>

  <!-- ===== 五大类别卡片 ===== -->
  <!-- 提交 commit -->
  <rect x="30" y="82" width="220" height="148" rx="10" fill="url(#commitGrad)" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="106" text-anchor="middle" class="cat-title" fill="#1e3a8a">① 提交 commit</text>
  <text x="140" y="124" text-anchor="middle" class="cat-sub" fill="#475569">查看 / 修正 / 删除提交</text>
  <line x1="50" y1="134" x2="230" y2="134" stroke="#93c5fd" stroke-width="1"/>
  <text x="45" y="152" class="item">• git show  看刚提交了什么</text>
  <text x="45" y="170" class="item">• git commit --amend  改信息</text>
  <text x="45" y="188" class="item">• git reset HEAD^ --hard  删除</text>
  <text x="45" y="206" class="item">• git revert  撤销已推提交</text>
  <text x="45" y="224" class="item">• git push -f  强推修正（慎用）</text>

  <!-- 暂存 staging -->
  <rect x="290" y="82" width="220" height="148" rx="10" fill="url(#stageGrad)" stroke="#4ade80" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="106" text-anchor="middle" class="cat-title" fill="#14532d">② 暂存 staging</text>
  <text x="400" y="124" text-anchor="middle" class="cat-sub" fill="#475569">选择性入区 / 撤回</text>
  <line x1="310" y1="134" x2="490" y2="134" stroke="#86efac" stroke-width="1"/>
  <text x="305" y="152" class="item">• git add -p  暂存文件一部分</text>
  <text x="305" y="170" class="item">• git add -N  新文件先记名</text>
  <text x="305" y="188" class="item">• git stash  暂存工作改动</text>
  <text x="305" y="206" class="item">• git stash list / apply</text>
  <text x="305" y="224" class="item">• git stash -m  带消息记录</text>

  <!-- 分支 branches -->
  <rect x="550" y="82" width="220" height="148" rx="10" fill="url(#branchGrad)" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="106" text-anchor="middle" class="cat-title" fill="#78350f">③ 分支 branches</text>
  <text x="660" y="124" text-anchor="middle" class="cat-sub" fill="#475569">建 / 切 / 删 / 恢复分支</text>
  <line x1="570" y1="134" x2="750" y2="134" stroke="#fcd34d" stroke-width="1"/>
  <text x="565" y="152" class="item">• git checkout -b  新分支</text>
  <text x="565" y="170" class="item">• git cherry-pick  挑提交</text>
  <text x="565" y="188" class="item">• git branch -D  删本地分支</text>
  <text x="565" y="206" class="item">• git push origin --delete</text>
  <text x="565" y="224" class="item">• git checkout --track  跟踪</text>

  <!-- 合并 rebase/merge -->
  <rect x="160" y="252" width="240" height="148" rx="10" fill="url(#mergeGrad)" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="276" text-anchor="middle" class="cat-title" fill="#4c1d95">④ 合并 rebasing / merging</text>
  <text x="280" y="294" text-anchor="middle" class="cat-sub" fill="#475569">整合分支与组合提交</text>
  <line x1="180" y1="304" x2="380" y2="304" stroke="#c4b5fd" stroke-width="1"/>
  <text x="175" y="322" class="item">• git rebase -i  交互式整理历史</text>
  <text x="175" y="340" class="item">• pick / squash / fixup  组合提交</text>
  <text x="175" y="358" class="item">• git merge --no-ff --no-commit</text>
  <text x="175" y="376" class="item">• git merge --squash  合为单提交</text>
  <text x="175" y="394" class="item">• 解决冲突 → add → continue</text>

  <!-- 杂项 misc -->
  <rect x="420" y="252" width="220" height="148" rx="10" fill="url(#miscGrad)" stroke="#f87171" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="530" y="276" text-anchor="middle" class="cat-title" fill="#7f1d1d">⑤ 杂项 misc</text>
  <text x="530" y="294" text-anchor="middle" class="cat-sub" fill="#475569">子模块 / 标签 / 配置 / 别名</text>
  <line x1="440" y1="304" x2="620" y2="304" stroke="#fca5a5" stroke-width="1"/>
  <text x="435" y="322" class="item">• git clone --recursive  子模块</text>
  <text x="435" y="340" class="item">• git tag -d / update-ref</text>
  <text x="435" y="358" class="item">• git rm --cached  留文件删记录</text>
  <text x="435" y="376" class="item">• git config alias  起别名</text>
  <text x="435" y="394" class="item">• credential.helper  缓存凭证</text>

  <!-- 连接到底层 reflog 的箭头 -->
  <line x1="140" y1="230" x2="320" y2="438" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#recArrow)" opacity="0.55"/>
  <line x1="400" y1="230" x2="400" y2="438" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#recArrow)" opacity="0.55"/>
  <line x1="660" y1="230" x2="480" y2="438" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#recArrow)" opacity="0.55"/>
  <line x1="280" y1="400" x2="370" y2="438" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#recArrow)" opacity="0.55"/>
  <line x1="530" y1="400" x2="440" y2="438" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#recArrow)" opacity="0.55"/>

  <!-- ===== 底层安全网：reflog ===== -->
  <rect x="80" y="442" width="640" height="148" rx="12" fill="url(#reflogGrad)" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="470" text-anchor="middle" font-size="20" font-weight="700" fill="#312e81">🛟 底层安全网：git reflog</text>
  <text x="400" y="492" text-anchor="middle" font-size="14" fill="#475569">记录分支顶端（HEAD）的每一次改变——即使提交已删除、历史已改写，本地仍能找回</text>
  <line x1="100" y1="504" x2="700" y2="504" stroke="#a5b4fc" stroke-width="1"/>
  <text x="100" y="524" class="item">• 删错分支 / 硬重置后找回内容：git reflog → git reset --hard &lt;SHA&gt;</text>
  <text x="100" y="544" class="item">• 从错误分支拉取后回到正确位置：git reflog 定位 HEAD 旧指向再重置</text>
  <text x="100" y="564" class="item">• 撤销一次 rebase / merge：git reset --hard ORIG_HEAD</text>
  <text x="100" y="584" class="item">注意：reflog 只对本地有效、仅跟踪动作、记录只保留几天——已推的不可逆操作须靠 git revert 抵消</text>
</svg>
