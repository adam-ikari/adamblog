<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="cardFile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="cardSys" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="cardProc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="cardNet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="cardPerm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="cardAdv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.14"/>
    </filter>
  </defs>

  <style>
    text { fill: #333333; }
    .title { fill: #1a1a1a; }
    .cardTitle { fill: #1f2937; }
    .cmd { fill: #374151; }
    .axisLabel { fill: #4b5563; }
  </style>

  <rect width="800" height="640" fill="url(#bg)"/>

  <text x="400" y="40" text-anchor="middle" font-size="27" font-weight="700" class="title">Linux 入门命令全景图：按职能分类</text>
  <text x="400" y="64" text-anchor="middle" font-size="14" fill="#6b7280">六大职能模块覆盖日常操作，进阶命令用于系统管理与排错</text>

  <!-- 进阶层分隔（右下角，灰色标签） -->
  <rect x="575" y="470" width="205" height="130" rx="10" fill="url(#cardAdv)" stroke="#6366f1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="677" y="494" text-anchor="middle" font-size="16" font-weight="700" fill="#3730a3">进阶命令 · 管理与排错</text>
  <text x="590" y="516" font-size="14" class="cmd" font-family="monospace">grep / find 检索</text>
  <text x="590" y="536" font-size="14" class="cmd" font-family="monospace">tar 打包压缩</text>
  <text x="590" y="556" font-size="14" class="cmd" font-family="monospace">sed / awk 文本流</text>
  <text x="590" y="576" font-size="14" class="cmd" font-family="monospace">ssh-keygen / rsync</text>
  <text x="590" y="594" font-size="12" fill="#6b7280">日常够用之后再学</text>

  <!-- 中心核心 -->
  <circle cx="305" cy="305" r="62" fill="url(#coreGrad)" filter="url(#shadow)"/>
  <text x="305" y="298" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Shell</text>
  <text x="305" y="320" text-anchor="middle" font-size="13" fill="#dbeafe">命令行入口</text>

  <!-- 连线（先画，置于卡片下） -->
  <line x1="305" y1="243" x2="305" y2="195" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="367" y1="305" x2="430" y2="305" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="305" y1="367" x2="305" y2="415" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="243" y1="305" x2="180" y2="305" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="261" y1="261" x2="180" y2="195" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="349" y1="349" x2="430" y2="415" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- 卡片1: 文件和目录操作（上） -->
  <rect x="170" y="100" width="270" height="95" rx="10" fill="url(#cardFile)" stroke="#1e40af" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="305" y="124" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">文件和目录操作</text>
  <text x="184" y="146" font-size="14" class="cmd" font-family="monospace">ls cd pwd mkdir touch</text>
  <text x="184" y="166" font-size="14" class="cmd" font-family="monospace">cp mv rm cat head tail</text>
  <text x="184" y="186" font-size="12" fill="#4b5563">增删改查 · 最常用</text>

  <!-- 卡片2: 系统信息（右上） -->
  <rect x="460" y="100" width="220" height="95" rx="10" fill="url(#cardSys)" stroke="#6d28d9" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="570" y="124" text-anchor="middle" font-size="16" font-weight="700" fill="#5b21b6">系统信息</text>
  <text x="474" y="148" font-size="14" class="cmd" font-family="monospace">uname whoami hostname</text>
  <text x="474" y="168" font-size="14" class="cmd" font-family="monospace">date cal</text>
  <text x="474" y="186" font-size="12" fill="#4b5563">看系统与时间</text>

  <!-- 卡片3: 进程管理（右） -->
  <rect x="440" y="258" width="240" height="95" rx="10" fill="url(#cardProc)" stroke="#b45309" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="560" y="282" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">进程管理</text>
  <text x="454" y="306" font-size="14" class="cmd" font-family="monospace">ps top 看进程</text>
  <text x="454" y="326" font-size="14" class="cmd" font-family="monospace">kill killall 终止</text>
  <text x="454" y="344" font-size="12" fill="#4b5563">监控与收尾</text>

  <!-- 卡片4: 权限管理（右下） -->
  <rect x="380" y="400" width="180" height="95" rx="10" fill="url(#cardPerm)" stroke="#dc2626" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="470" y="424" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">权限管理</text>
  <text x="394" y="448" font-size="14" class="cmd" font-family="monospace">chmod 改权限</text>
  <text x="394" y="468" font-size="14" class="cmd" font-family="monospace">chown / chgrp</text>
  <text x="394" y="486" font-size="12" fill="#4b5563">所有权三件套</text>

  <!-- 卡片5: 网络操作（左下） -->
  <rect x="60" y="400" width="180" height="95" rx="10" fill="url(#cardNet)" stroke="#16a34a" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="150" y="424" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">网络操作</text>
  <text x="74" y="448" font-size="14" class="cmd" font-family="monospace">ping ifconfig</text>
  <text x="74" y="468" font-size="14" class="cmd" font-family="monospace">netstat ssh</text>
  <text x="74" y="486" font-size="12" fill="#4b5563">连通与远程</text>

  <!-- 卡片6: 常用命令总览（左上，对应"常用命令"大节） -->
  <rect x="40" y="100" width="120" height="95" rx="10" fill="#ffffff" stroke="#1e40af" stroke-width="1.2" stroke-dasharray="4 3" filter="url(#shadow)"/>
  <text x="100" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">常用命令</text>
  <text x="100" y="150" text-anchor="middle" font-size="12" fill="#4b5563">五大职能</text>
  <text x="100" y="170" text-anchor="middle" font-size="12" fill="#4b5563">日常够用</text>
  <text x="100" y="190" text-anchor="middle" font-size="12" fill="#6b7280">先把这组用熟</text>

  <!-- 底部：能力递进轴 -->
  <text x="305" y="528" text-anchor="middle" font-size="14" font-weight="600" fill="#4b5563">能力递进</text>
  <line x1="120" y1="548" x2="490" y2="548" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="120" cy="548" r="6" fill="#16a34a"/>
  <circle cx="490" cy="548" r="6" fill="#b45309"/>
  <text x="120" y="574" text-anchor="middle" font-size="13" class="axisLabel">常用：日常操作</text>
  <text x="490" y="574" text-anchor="middle" font-size="13" class="axisLabel">进阶：管理与排错</text>
  <text x="305" y="596" text-anchor="middle" font-size="12" fill="#6b7280">由熟到精，逐步过渡到系统管理与排错场景</text>
</svg>
