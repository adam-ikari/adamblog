<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="startGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="okGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="warnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="failGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <marker id="arrowOk" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#16a34a"/>
    </marker>
    <marker id="arrowFail" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#dc2626"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    text { fill: #333333; }
    .title { font-size: 27px; font-weight: 700; fill: #1a1a1a; }
    .node-title { font-size: 19px; font-weight: 700; }
    .item { font-size: 15px; fill: #444444; }
    .branch-tag { font-size: 17px; font-weight: 700; }
    .small { font-size: 13px; fill: #666666; }
    .verdict { font-size: 15px; font-weight: 700; }
  </style>

  <text x="400" y="34" text-anchor="middle" class="title">NW-A306 国行→国际版固件：1.x 可行，2.x 失败</text>

  <!-- 起点：国行版 -->
  <rect x="280" y="56" width="240" height="78" rx="10" fill="url(#startGrad)" stroke="#93c5fd" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="84" text-anchor="middle" class="node-title" fill="#1e40af">起点：NW-A306 国行版</text>
  <text x="400" y="108" text-anchor="middle" class="item">手动刷入国际版 .UPG 固件</text>
  <text x="400" y="126" text-anchor="middle" class="small">拷至播放器根目录（勿放 SD 卡）→ 关 WiFi → 系统更新</text>

  <!-- 分叉线 -->
  <line x1="400" y1="134" x2="400" y2="158" stroke="#999" stroke-width="1.5"/>
  <line x1="180" y1="158" x2="620" y2="158" stroke="#999" stroke-width="1.5"/>
  <line x1="180" y1="158" x2="180" y2="186" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowOk)"/>
  <line x1="620" y1="158" x2="620" y2="186" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowFail)"/>

  <text x="180" y="152" text-anchor="middle" class="branch-tag" fill="#16a34a">国际版 1.0.1</text>
  <text x="620" y="152" text-anchor="middle" class="branch-tag" fill="#dc2626">国际版 2.0.1 / 2.0.2</text>

  <!-- 左路：成功 -->
  <rect x="40" y="192" width="280" height="150" rx="10" fill="url(#okGrad)" stroke="#86efac" stroke-width="1" filter="url(#shadow)"/>
  <text x="180" y="220" text-anchor="middle" class="node-title" fill="#166534">✓ 成功路径</text>
  <text x="60" y="248" class="item">• 越过国行 1.x，刷入国际版 1.0.1</text>
  <text x="60" y="272" class="item">• 获得完整 Google 框架与功能</text>
  <text x="60" y="296" class="item">• 流程稳定，不触发无限重启</text>
  <text x="60" y="326" class="verdict" fill="#16a34a">→ 国行 1.x 升国际 1.x：可行</text>

  <!-- 右路：失败 -->
  <rect x="480" y="192" width="280" height="150" rx="10" fill="url(#failGrad)" stroke="#fca5a5" stroke-width="1" filter="url(#shadow)"/>
  <text x="620" y="220" text-anchor="middle" class="node-title" fill="#991b1b">✗ 失败路径</text>
  <text x="500" y="248" class="item">• 国行 2.x 强升国际版 2.x</text>
  <text x="500" y="272" class="item">• 设备无限重启，无法完成升级</text>
  <text x="500" y="296" class="item">• 固件最终回滚，无解</text>
  <text x="500" y="326" class="verdict" fill="#dc2626">→ 2.x.x 之后方法已失效</text>

  <!-- 底部提示带 -->
  <rect x="40" y="362" width="720" height="78" rx="10" fill="url(#warnGrad)" stroke="#fcd34d" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="390" class="node-title" fill="#92400e">⚠ 升级前置条件（缺一不可）</text>
  <text x="60" y="414" class="item">电量 &gt; 60% 且处于充电状态 · 内部可用空间约 4.0GB · 升级前备份数据</text>
  <text x="60" y="432" class="small">固件升级不可逆，无法回退到旧版本</text>

  <!-- 固件版本来源 -->
  <rect x="40" y="456" width="720" height="78" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="482" class="node-title" fill="#1e40af">固件下载地址来源</text>
  <text x="60" y="506" class="item">info.update.sony.net 国行 _0003 / 国际 _0000 目录下的 info.xml</text>
  <text x="60" y="524" class="small">curl 取 Distribution 字段，拿到对应版本的 .UPG 直链</text>
</svg>
