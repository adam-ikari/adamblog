<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <marker id="flowArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#16a34a"/>
    </marker>
    <marker id="aliasArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#1e40af"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    text { fill: #333333; }
    .cmd { font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; }
  </style>

  <rect width="800" height="720" fill="url(#bg)"/>

  <text x="400" y="36" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">nvm 工作流：从安装到项目级版本管理</text>
  <text x="400" y="60" text-anchor="middle" font-size="14" fill="#666">每个 Node.js 版本独立运行时 + 独立全局包目录，靠改 PATH 切换</text>

  <!-- ===== 步骤 1：安装 nvm ===== -->
  <rect x="40" y="84" width="320" height="82" rx="10" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="56" y="108" font-size="15" font-weight="700" fill="#0c4a6e">① 安装 nvm 本体</text>
  <text x="56" y="130" class="cmd" font-size="13" fill="#155e75">curl ...nvm/install.sh | bash</text>
  <text x="56" y="150" font-size="13" fill="#555">克隆到 ~/.nvm，写入 .bashrc/.zshrc</text>

  <!-- ===== 步骤 2：查可装版本 ===== -->
  <rect x="440" y="84" width="320" height="82" rx="10" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="456" y="108" font-size="15" font-weight="700" fill="#0c4a6e">② 查看可安装版本</text>
  <text x="456" y="130" class="cmd" font-size="13" fill="#155e75">nvm ls-remote [--lts]</text>
  <text x="456" y="150" font-size="13" fill="#555">列出所有 / 仅 LTS 版本</text>

  <line x1="360" y1="125" x2="438" y2="125" stroke="#16a34a" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- 步骤2→步骤3 箭头 -->
  <line x1="600" y1="166" x2="600" y2="200" stroke="#16a34a" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- ===== 步骤 3：装版本 ===== -->
  <rect x="440" y="204" width="320" height="82" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="456" y="228" font-size="15" font-weight="700" fill="#14532d">③ 安装 Node.js 版本</text>
  <text x="456" y="250" class="cmd" font-size="13" fill="#166534">nvm install 20.19.0 | --lts</text>
  <text x="456" y="270" font-size="13" fill="#555">下载到 ~/.nvm/versions/node/</text>

  <!-- 3→4 -->
  <line x1="600" y1="286" x2="600" y2="320" stroke="#16a34a" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- ===== 步骤 4：切换（当前 Shell） ===== -->
  <rect x="440" y="324" width="320" height="82" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="456" y="348" font-size="15" font-weight="700" fill="#14532d">④ 切换到某版本</text>
  <text x="456" y="370" class="cmd" font-size="13" fill="#166534">nvm use 20.19.0</text>
  <text x="456" y="390" font-size="13" fill="#555">改 PATH，仅当前终端生效</text>

  <!-- 4→右侧别名分支 -->
  <line x1="760" y1="365" x2="778" y2="365" stroke="#1e40af" stroke-width="0"/>

  <!-- ===== 右侧：别名 / default ===== -->
  <rect x="440" y="444" width="320" height="96" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="456" y="468" font-size="15" font-weight="700" fill="#4c1d95">⑤ 别名与默认版本</text>
  <text x="456" y="490" class="cmd" font-size="13" fill="#5b21b6">nvm alias default 20.19.0</text>
  <text x="456" y="510" class="cmd" font-size="13" fill="#5b21b6">nvm alias legacy 18.20.5</text>
  <text x="456" y="528" font-size="13" fill="#555">use 仅当前终端；default 影响新终端</text>

  <!-- 4→5 -->
  <line x1="600" y1="406" x2="600" y2="442" stroke="#1e40af" stroke-width="2" marker-end="url(#aliasArrow)"/>

  <!-- ===== 左下：项目级 .nvmrc ===== -->
  <rect x="40" y="444" width="320" height="96" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="56" y="468" font-size="15" font-weight="700" fill="#78350f">⑥ 项目级版本管理</text>
  <text x="56" y="490" class="cmd" font-size="13" fill="#92400e">echo "20.19.0" &gt; .nvmrc</text>
  <text x="56" y="510" class="cmd" font-size="13" fill="#92400e">nvm use   # 读 .nvmrc 自动切</text>
  <text x="56" y="528" font-size="13" fill="#555">版本号随代码进版本控制，团队一致</text>

  <!-- 中间桥：default 也能被 .nvmrc 覆盖 -->
  <line x1="360" y1="492" x2="438" y2="492" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="399" y="486" text-anchor="middle" font-size="12" fill="#b45309">进项目覆盖</text>

  <!-- ===== 底部：每版本独立全局包（信息增量） ===== -->
  <rect x="40" y="572" width="720" height="128" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="56" y="596" font-size="16" font-weight="700" fill="#991b1b">关键机制：每个版本一套独立全局包，切换后不跟随</text>
  <text x="56" y="616" font-size="13" fill="#666">路径 ~/.nvm/versions/node/&lt;version&gt;/lib/node_modules/</text>

  <!-- 三个版本列 -->
  <rect x="60" y="628" width="210" height="58" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="165" y="648" text-anchor="middle" class="cmd" font-size="14" font-weight="700" fill="#166534">v18.20.5</text>
  <text x="165" y="672" text-anchor="middle" font-size="12" fill="#666">pnpm · typescript</text>

  <rect x="295" y="628" width="210" height="58" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="400" y="648" text-anchor="middle" class="cmd" font-size="14" font-weight="700" fill="#166534">v20.19.0</text>
  <text x="400" y="672" text-anchor="middle" font-size="12" fill="#666">（独立，需重装）</text>

  <rect x="530" y="628" width="210" height="58" rx="6" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="635" y="648" text-anchor="middle" class="cmd" font-size="14" font-weight="700" fill="#166534">v22.16.0</text>
  <text x="635" y="672" text-anchor="middle" font-size="12" fill="#666">pnpm · eslint · prettier</text>

  <!-- 步骤4 切换 → 底部机制 说明 -->
  <line x1="600" y1="540" x2="600" y2="568" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#flowArrow)"/>
  <text x="610" y="558" font-size="12" fill="#dc2626">切换即换目录</text>
</svg>
