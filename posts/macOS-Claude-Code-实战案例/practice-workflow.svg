<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="envGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="cfgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="doGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <marker id="fArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#6366f1"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <style>
    text { fill: #333333; }
    .title { font-size: 26px; font-weight: 700; fill: #1a1a1a; }
    .sub { font-size: 17px; fill: #666; }
    .step { font-size: 15px; font-weight: 700; }
    .note { font-size: 13px; fill: #666; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">Claude Code + DeepSeek 实战流程</text>
  <text x="400" y="52" text-anchor="middle" class="sub">从环境到费用复盘——8 步把国产模型跑通一个真项目</text>

  <!-- 第一行：步骤 1-4 -->
  <rect x="20" y="80" width="180" height="100" rx="8" fill="url(#envGrad)" stroke="#93c5fd" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="106" text-anchor="middle" class="step" fill="#1e40af">① 确认环境</text>
  <line x1="40" y1="116" x2="180" y2="116" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="30" y="138" class="note">Node 18+</text>
  <text x="30" y="158" class="note">Claude Code 已装</text>
  <text x="30" y="176" class="note">终端能跑 claude</text>

  <line x1="200" y1="130" x2="220" y2="130" stroke="#6366f1" stroke-width="1.5" marker-end="url(#fArrow)"/>

  <rect x="220" y="80" width="180" height="100" rx="8" fill="url(#keyGrad)" stroke="#86efac" stroke-width="1" filter="url(#shadow)"/>
  <text x="310" y="106" text-anchor="middle" class="step" fill="#166534">② 拿 API Key</text>
  <line x1="240" y1="116" x2="380" y2="116" stroke="#86efac" stroke-width="0.5"/>
  <text x="230" y="138" class="note">DeepSeek 开放平台</text>
  <text x="230" y="158" class="note">充值拿 sk-...</text>
  <text x="230" y="176" class="note">记下别泄露</text>

  <line x1="400" y1="130" x2="420" y2="130" stroke="#6366f1" stroke-width="1.5" marker-end="url(#fArrow)"/>

  <rect x="420" y="80" width="180" height="100" rx="8" fill="url(#cfgGrad)" stroke="#fcd34d" stroke-width="1" filter="url(#shadow)"/>
  <text x="510" y="106" text-anchor="middle" class="step" fill="#92400e">③ 配置 Claude Code</text>
  <line x1="440" y1="116" x2="580" y2="116" stroke="#fcd34d" stroke-width="0.5"/>
  <text x="430" y="138" class="note">settings.json env</text>
  <text x="430" y="158" class="note">base_url+auth_token</text>
  <text x="430" y="176" class="note">+DEFAULT_*_MODEL</text>

  <line x1="600" y1="130" x2="620" y2="130" stroke="#6366f1" stroke-width="1.5" marker-end="url(#fArrow)"/>

  <rect x="620" y="80" width="160" height="100" rx="8" fill="url(#cfgGrad)" stroke="#fcd34d" stroke-width="1" filter="url(#shadow)"/>
  <text x="700" y="106" text-anchor="middle" class="step" fill="#92400e">④ 先验证</text>
  <line x1="640" y1="116" x2="760" y2="116" stroke="#fcd34d" stroke-width="0.5"/>
  <text x="630" y="138" class="note">curl 打 API</text>
  <text x="630" y="158" class="note">返回 JSON 再继续</text>
  <text x="630" y="176" class="note">二分排除坑</text>

  <!-- 第二行：步骤 5-8 -->
  <rect x="20" y="210" width="180" height="100" rx="8" fill="url(#cfgGrad)" stroke="#fcd34d" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="236" text-anchor="middle" class="step" fill="#92400e">⑤ CLAUDE.md</text>
  <line x1="40" y1="246" x2="180" y2="246" stroke="#fcd34d" stroke-width="0.5"/>
  <text x="30" y="268" class="note">设项目上下文</text>
  <text x="30" y="288" class="note">技术栈/编码规范</text>
  <text x="30" y="306" class="note">让模型懂项目</text>

  <line x1="200" y1="260" x2="220" y2="260" stroke="#6366f1" stroke-width="1.5" marker-end="url(#fArrow)"/>

  <rect x="220" y="210" width="180" height="100" rx="8" fill="url(#doGrad)" stroke="#c4b5fd" stroke-width="1" filter="url(#shadow)"/>
  <text x="310" y="236" text-anchor="middle" class="step" fill="#5b21b6">⑥ 让模型实现</text>
  <line x1="240" y1="246" x2="380" y2="246" stroke="#c4b5fd" stroke-width="0.5"/>
  <text x="230" y="268" class="note">描述需求</text>
  <text x="230" y="288" class="note">迭代修 bug</text>
  <text x="230" y="306" class="note">代码 review</text>

  <line x1="400" y1="260" x2="420" y2="260" stroke="#6366f1" stroke-width="1.5" marker-end="url(#fArrow)"/>

  <rect x="420" y="210" width="180" height="100" rx="8" fill="url(#doGrad)" stroke="#c4b5fd" stroke-width="1" filter="url(#shadow)"/>
  <text x="510" y="236" text-anchor="middle" class="step" fill="#5b21b6">⑦ 本地测试</text>
  <line x1="440" y1="246" x2="580" y2="246" stroke="#c4b5fd" stroke-width="0.5"/>
  <text x="430" y="268" class="note">npm install</text>
  <text x="430" y="288" class="note">跑通验证</text>
  <text x="430" y="306" class="note">真实环境验</text>

  <line x1="600" y1="260" x2="620" y2="260" stroke="#6366f1" stroke-width="1.5" marker-end="url(#fArrow)"/>

  <rect x="620" y="210" width="160" height="100" rx="8" fill="url(#envGrad)" stroke="#93c5fd" stroke-width="1" filter="url(#shadow)"/>
  <text x="700" y="236" text-anchor="middle" class="step" fill="#1e40af">⑧ 费用复盘</text>
  <line x1="640" y1="246" x2="760" y2="246" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="630" y="268" class="note">看 token 消耗</text>
  <text x="630" y="288" class="note">算实际成本</text>
  <text x="630" y="306" class="note">对比官方 API</text>

  <!-- 底部：踩坑提示 -->
  <rect x="20" y="332" width="760" height="60" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="40" y="358" class="step" fill="#991b1b">⚠ 踩坑四类</text>
  <text x="40" y="378" class="note" fill="#7f1d1d">API_KEY→AUTH_TOKEN(401) · 没映射档位(model not found) · 改配置没重启(行为没变) · 上下文太长(/compact)</text>

  <text x="400" y="410" text-anchor="middle" class="note" fill="#888">实战核心：先验证再开干——curl 二分排除坑，比直接改配置省十倍事</text>
</svg>
